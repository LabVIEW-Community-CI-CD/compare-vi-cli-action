name: Agent Review Policy

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review, edited, labeled, unlabeled, review_requested, review_request_removed]
  pull_request_review:
    types: [submitted, edited, dismissed]

permissions:
  pull-requests: read
  contents: read

jobs:
  agent-review-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci --ignore-scripts

      - name: Build TypeScript utilities
        run: node tools/npm/run-script.mjs build

      - name: Collect Copilot review signal
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node dist/tools/priority/copilot-review-signal.js \
            --repo "${{ github.repository }}" \
            --pr "${{ github.event.pull_request.number }}" \
            --head-sha "${{ github.event.pull_request.head.sha }}" \
            --out tests/results/_agent/reviews/copilot-review-signal.json \
            --step-summary "$GITHUB_STEP_SUMMARY"

      - name: Validate Copilot review signal schema
        run: node tools/npm/run-script.mjs schema:copilot-review-signal:validate

      - name: Upload Copilot review signal artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: copilot-review-signal-${{ github.event.pull_request.number }}
          path: tests/results/_agent/reviews/copilot-review-signal.json
          if-no-files-found: error

      - name: Enforce required reviewer for agent-authored PRs
        uses: actions/github-script@v8
        env:
          REQUIRED_AGENT_REVIEWER: ${{ vars.REQUIRED_AGENT_REVIEWER || github.repository_owner }}
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            const labels = (pr.labels || []).map((l) => l.name);

            const hasAgentMetadata = /Agent[-\s]?ID\s*:/i.test(body);
            const hasCodexLabel = labels.includes('codex');
            const isAgentPR = hasAgentMetadata || hasCodexLabel;

            if (!isAgentPR) {
              core.info('PR is not marked as agent-authored; passing policy check.');
              return;
            }

            const bypassLabel = 'AllowCIBypass';
            if (labels.includes(bypassLabel)) {
              core.warning(`Bypass label '${bypassLabel}' detected; passing policy check.`);
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = pr.number;
            const requiredReviewer = (process.env.REQUIRED_AGENT_REVIEWER || owner).trim();
            const prAuthor = pr.user?.login || '';

            // GitHub does not allow self-approval, so skip enforcement when the PR author
            // is the required reviewer to avoid an unsatisfiable required check.
            if (prAuthor === requiredReviewer) {
              core.info(
                `PR author @${prAuthor} is the required reviewer; skipping self-approval requirement.`
              );
              return;
            }

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner,
              repo,
              pull_number,
              per_page: 100
            });

            // Emulate GitHub's review-decision semantics:
            // - COMMENTED reviews don't change the approval state
            // - APPROVED sets approved state
            // - CHANGES_REQUESTED or DISMISSED override any previous APPROVED
            const effectiveStateByUser = new Map();
            for (const review of reviews) {
              if (!review.user || !review.user.login) continue;
              const user = review.user.login;
              const state = review.state;
              
              // Ignore COMMENTED reviews - they don't affect approval status
              if (state === 'COMMENTED') continue;
              
              // APPROVED, CHANGES_REQUESTED, DISMISSED all update the effective state
              effectiveStateByUser.set(user, state);
            }

            const reviewerState = effectiveStateByUser.get(requiredReviewer) || 'NONE';
            if (reviewerState !== 'APPROVED') {
              core.setFailed(
                `Agent PR requires approval from @${requiredReviewer}. Current state: ${reviewerState}. ` +
                `If urgent, apply '${bypassLabel}' label with explicit rationale.`
              );
              return;
            }

            core.info(`Policy satisfied: @${requiredReviewer} approved this agent-authored PR.`);
