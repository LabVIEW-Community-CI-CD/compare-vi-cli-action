name: PrintToSingleFileHtml Proof

on:
  workflow_dispatch:
    inputs:
      target_id:
        description: 'Headless sample-corpus target id'
        required: true
        default: 'icon-editor-demo-canaryprobe-print'
        type: string

permissions:
  contents: read

jobs:
  print-to-single-file-html-proof:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Node dependencies
        run: node tools/npm/cli.mjs ci --ignore-scripts

      - name: Run PrintToSingleFileHtml proof wrapper
        shell: pwsh
        run: |
          pwsh -NoLogo -NoProfile -File tools/Invoke-HeadlessSampleVICorpusPrintProof.ps1 `
            -TargetId '${{ inputs.target_id }}'

      - name: Upload PrintToSingleFileHtml proof artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: print-to-single-file-html-proof
          path: |
            tests/results/_agent/headless-sample-corpus/print-proof/*.json
            tests/results/_agent/headless-sample-corpus/print-proof/*.md
          if-no-files-found: error
