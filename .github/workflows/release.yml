name: Release on tag

on:
  push:
    tags:
      - 'v*'

jobs:
  release-gate:
    runs-on: [self-hosted, windows, x64]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install npm dependencies
        shell: pwsh
        run: |
          node tools/npm/cli.mjs ci --no-audit --no-fund

      - name: Run matrix release gate (Windows container lane)
        shell: pwsh
        run: |
          $historyViPath = if ([string]::IsNullOrWhiteSpace('${{ vars.RELEASE_HISTORY_VI_PATH }}')) { 'fixtures/vi-attr/Head.vi' } else { '${{ vars.RELEASE_HISTORY_VI_PATH }}' }
          $historyStartRef = if ([string]::IsNullOrWhiteSpace('${{ vars.RELEASE_HISTORY_START_REF }}')) { 'HEAD' } else { '${{ vars.RELEASE_HISTORY_START_REF }}' }
          $historyEndRef = if ([string]::IsNullOrWhiteSpace('${{ vars.RELEASE_HISTORY_END_REF }}')) { '' } else { '${{ vars.RELEASE_HISTORY_END_REF }}' }
          $hostLabviewPath = if ([string]::IsNullOrWhiteSpace('${{ vars.RELEASE_HOST_LABVIEW_PATH }}')) { 'C:\Program Files\National Instruments\LabVIEW 2026\LabVIEW.exe' } else { '${{ vars.RELEASE_HOST_LABVIEW_PATH }}' }
          $containerLabviewPath = if ([string]::IsNullOrWhiteSpace('${{ vars.RELEASE_CONTAINER_LABVIEW_PATH }}')) { 'C:\Program Files\National Instruments\LabVIEW 2026\LabVIEW.exe' } else { '${{ vars.RELEASE_CONTAINER_LABVIEW_PATH }}' }

          $args = @(
            '-NoLogo','-NoProfile','-File','tools/Run-ValidationMatrix.ps1',
            '-LaneScope','windows',
            '-HistoryViPath',$historyViPath,
            '-HistoryStartRef',$historyStartRef,
            '-LabVIEWPath',$hostLabviewPath,
            '-ContainerLabVIEWPath',$containerLabviewPath
          )
          if (-not [string]::IsNullOrWhiteSpace($historyEndRef)) {
            $args += '-HistoryEndRef'
            $args += $historyEndRef
          }
          & pwsh @args

  release:
    needs: release-gate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write
    outputs:
      cli_version: ${{ steps.meta.outputs.cli_version }}
    steps:
      - uses: actions/checkout@v5

      - name: Build release notes from CHANGELOG
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          awk -v tag="$TAG" '
            $0 ~ "^##[[:space:]]*\\[?" tag "\\]?$" {print; in=1; next}
            in && $0 ~ "^##[[:space:]]*\\[" {exit}
            in && $0 ~ "^##[[:space:]]*v?[0-9]" {exit}
            in {print}
          ' CHANGELOG.md > RELEASE_NOTES.md || true
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "No changelog section found for $TAG. Falling back to auto-generated notes." | tee RELEASE_NOTES.md
            echo "fallback=true" >> "$GITHUB_OUTPUT"
          else
            echo "fallback=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Compute CLI version
        id: meta
        shell: pwsh
        run: |
          [xml]$xml = Get-Content -Raw Directory.Build.props
          $ver = $xml.Project.PropertyGroup.Version
          if (-not $ver) { $ver = '0.0.0' }
          "cli_version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Publish CLI artifacts
        shell: pwsh
        run: pwsh -File tools/Publish-Cli.ps1 -FrameworkDependent:$false -SelfContained -SingleFile -Deterministic -Rids win-x64,linux-x64

      - name: Package CLI requirements asset
        shell: pwsh
        run: pwsh -NoLogo -NoProfile -File tools/Package-RequirementsAsset.ps1

      - name: Generate SBOM (SPDX)
        shell: pwsh
        run: pwsh -NoLogo -NoProfile -File tools/Generate-ReleaseSbom.ps1 -ArtifactsRoot artifacts/cli -OutputPath sbom.spdx.json

      - name: Generate provenance metadata
        shell: pwsh
        run: pwsh -NoLogo -NoProfile -File tools/Generate-ReleaseProvenance.ps1 -ArtifactsRoot artifacts/cli -OutputPath provenance.json

      - name: Upload workflow artifact (CLI)
        uses: actions/upload-artifact@v5
        with:
          name: cli-artifacts
          path: |
            artifacts/cli/*.zip
            artifacts/cli/*.tar.gz
            artifacts/cli/SHA256SUMS.txt
            artifacts/cli/sbom.spdx.json
            artifacts/cli/provenance.json
          if-no-files-found: error

      - name: Attest release assets provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            artifacts/cli/*.zip
            artifacts/cli/*.tar.gz
            artifacts/cli/SHA256SUMS.txt
            artifacts/cli/sbom.spdx.json
            artifacts/cli/provenance.json

      - name: Create release and upload assets (CHANGELOG)
        if: steps.notes.outputs.fallback == 'false'
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: ${{ contains(github.ref_name, '-') && 'false' || 'true' }}
          files: |
            artifacts/cli/*.zip
            artifacts/cli/*.tar.gz
            artifacts/cli/SHA256SUMS.txt
            artifacts/cli/sbom.spdx.json
            artifacts/cli/provenance.json

      - name: Create release and upload assets (auto notes)
        if: steps.notes.outputs.fallback == 'true'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: ${{ contains(github.ref_name, '-') && 'false' || 'true' }}
          files: |
            artifacts/cli/*.zip
            artifacts/cli/*.tar.gz
            artifacts/cli/SHA256SUMS.txt
            artifacts/cli/sbom.spdx.json
            artifacts/cli/provenance.json

  validate-cli-artifacts:
    runs-on: ${{ matrix.os }}
    needs: release
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v5

      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          name: cli-artifacts
          path: cli-dl

      - name: Extract artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $v = '${{ needs.release.outputs.cli_version }}'
          $zip = Get-ChildItem -Recurse -Path cli-dl -Filter "comparevi-cli-v$($v)-win-x64-selfcontained.zip" | Select-Object -First 1
          if (-not $zip) { throw "Artifact not found for Windows" }
          Expand-Archive -Path $zip.FullName -DestinationPath cli-out
          Get-ChildItem cli-out | Out-Host

      - name: Verify checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $v = '${{ needs.release.outputs.cli_version }}'
          $zip = Get-ChildItem -Recurse -Path cli-dl -Filter "comparevi-cli-v$($v)-win-x64-selfcontained.zip" | Select-Object -First 1
          if (-not $zip) { throw "Artifact not found for Windows" }
          $sumPath = Join-Path 'cli-dl' 'SHA256SUMS.txt'
          if (-not (Test-Path $sumPath)) { throw "Missing SHA256SUMS.txt" }
          $entries = @()
          foreach ($line in Get-Content $sumPath) {
            if ($line -match '^([0-9a-fA-F]{64})\s+(.+)$') {
              $entries += [pscustomobject]@{ Hash = $matches[1].ToLower(); Path = $matches[2].Trim(); Name = (Split-Path -Leaf $matches[2].Trim()) }
            }
          }
          if (-not $entries) { throw "No checksums parsed" }
          $expected = ($entries | Where-Object { $_.Name -eq $zip.Name } | Select-Object -First 1)
          if (-not $expected) { throw "No checksum entry found for $($zip.Name)" }
          $actual = (Get-FileHash -Algorithm SHA256 $zip.FullName).Hash.ToLower()
          if ($actual -ne $expected.Hash) { throw "SHA256 mismatch for $($zip.Name). expected=$($expected.Hash) actual=$actual" }
          Write-Host "Checksum OK for $($zip.Name)"

      - name: Extract artifact (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          v='${{ needs.release.outputs.cli_version }}'
          tarball=$(ls -1 cli-dl/comparevi-cli-v${v}-linux-x64-selfcontained.tar.gz)
          mkdir -p cli-out
          tar -xzf "$tarball" -C cli-out
          ls -la cli-out

      - name: Verify checksum (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          v='${{ needs.release.outputs.cli_version }}'
          file="comparevi-cli-v${v}-linux-x64-selfcontained.tar.gz"
          tarball="cli-dl/${file}"
          [ -f "$tarball" ]
          expected=$(awk -v file="$file" '$2 ~ file {print tolower($1)}' cli-dl/SHA256SUMS.txt)
          [ -n "$expected" ]
          actual=$(sha256sum "$tarball" | awk '{print tolower($1)}')
          if [ "$actual" != "$expected" ]; then
            echo "Checksum mismatch for $file: expected=$expected actual=$actual"
            exit 1
          fi
          echo "Checksum OK for $file"

      - name: Verify requirements asset and checksum (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          v='${{ needs.release.outputs.cli_version }}'
          req_zip="cli-dl/comparevi-cli-requirements-v${v}.zip"
          [ -f "$req_zip" ]
          req_file=$(basename "$req_zip")
          expected=$(awk -v file="$req_file" '$2 ~ file {print tolower($1)}' cli-dl/SHA256SUMS.txt)
          [ -n "$expected" ]
          actual=$(sha256sum "$req_zip" | awk '{print tolower($1)}')
          if [ "$actual" != "$expected" ]; then
            echo "Checksum mismatch for $req_file: expected=$expected actual=$actual"
            exit 1
          fi
          unzip -l "$req_zip" | grep -E 'DOTNET_CLI_RELEASE_ASSET.md|DOTNET_CLI_RELEASE_CHECKLIST.md|DOTNET_CLI_POWERSHELL_MAPPING.md' >/dev/null
          echo "Requirements asset and checksum OK"

      - name: Verify requirements asset and checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $v = '${{ needs.release.outputs.cli_version }}'
          $zip = Join-Path 'cli-dl' ("comparevi-cli-requirements-v{0}.zip" -f $v)
          if (-not (Test-Path -LiteralPath $zip -PathType Leaf)) { throw "Requirements asset not found: $zip" }

          $sumPath = Join-Path 'cli-dl' 'SHA256SUMS.txt'
          if (-not (Test-Path -LiteralPath $sumPath -PathType Leaf)) { throw "Missing SHA256SUMS.txt" }

          $entries = @()
          foreach ($line in Get-Content $sumPath) {
            if ($line -match '^([0-9a-fA-F]{64})\s+(.+)$') {
              $entries += [pscustomobject]@{ Hash = $matches[1].ToLower(); Path = $matches[2].Trim(); Name = (Split-Path -Leaf $matches[2].Trim()) }
            }
          }

          $expected = ($entries | Where-Object { $_.Name -eq (Split-Path -Leaf $zip) } | Select-Object -First 1)
          if (-not $expected) { throw "No checksum entry found for requirements zip" }
          $actual = (Get-FileHash -Algorithm SHA256 $zip).Hash.ToLower()
          if ($actual -ne $expected.Hash) { throw "SHA256 mismatch for requirements zip. expected=$($expected.Hash) actual=$actual" }

          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zipEntries = [System.IO.Compression.ZipFile]::OpenRead((Resolve-Path $zip)).Entries.FullName
          foreach ($required in @('DOTNET_CLI_RELEASE_ASSET.md','DOTNET_CLI_RELEASE_CHECKLIST.md','DOTNET_CLI_POWERSHELL_MAPPING.md')) {
            if (-not ($zipEntries | Where-Object { $_ -eq $required })) {
              throw "Missing required document in requirements zip: $required"
            }
          }
          Write-Host 'Requirements asset and checksum OK'

      - name: Smoke run (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exe = Resolve-Path 'cli-out/comparevi-cli.exe'
          $v = & $exe version | ConvertFrom-Json
          if ($v.name -ne 'comparevi-cli') { throw "Unexpected name: $($v.name)" }
          $tok = & $exe tokenize --input 'foo -x=1 "bar baz"' | ConvertFrom-Json
          if (-not ($tok.normalized -contains '-x' -and $tok.normalized -contains '1')) { throw 'Tokenize validation failed' }
          & $exe procs | Out-Null

      - name: Smoke run (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          bin="cli-out/comparevi-cli"
          # Ensure executable (tarballs from Windows builds may need this)
          chmod +x "$bin" || true
          ver_json=$("$bin" version)
          node -e "const o=JSON.parse(process.argv[1]); if(o.name!=='comparevi-cli') {throw new Error('bad name') }" "$ver_json"
          tok_json=$("$bin" tokenize --input 'foo -x=1 "bar baz"')
          node -e "const o=JSON.parse(process.argv[1]); if(!o.normalized.includes('-x')||!o.normalized.includes('1')) throw new Error('bad tokenize')" "$tok_json"
          "$bin" procs >/dev/null

      - name: Pull NI Linux image (hosted validation)
        if: runner.os == 'Linux'
        shell: bash
        run: docker pull nationalinstruments/labview:2026q1-linux

      - name: NI Linux image compare validation (hosted)
        if: runner.os == 'Linux'
        shell: pwsh
        run: |
          $resultsRoot = 'tests/results/release-validate/linux'
          New-Item -ItemType Directory -Path $resultsRoot -Force | Out-Null
          $reportPath = Join-Path $resultsRoot 'ni-linux-compare-report.html'
          $runtimeSnapshot = Join-Path $resultsRoot 'runtime-manager-linux.json'

          & ./tools/Run-NILinuxContainerCompare.ps1 `
            -BaseVi 'fixtures/vi-stage/control-rename/Base.vi' `
            -HeadVi 'fixtures/vi-stage/control-rename/Head.vi' `
            -Image 'nationalinstruments/labview:2026q1-linux' `
            -ReportPath $reportPath `
            -TimeoutSeconds 300 `
            -AutoRepairRuntime:$true `
            -RuntimeEngineReadyTimeoutSeconds 120 `
            -RuntimeEngineReadyPollSeconds 3 `
            -RuntimeSnapshotPath $runtimeSnapshot
          $compareExit = $LASTEXITCODE

          $capturePath = Join-Path $resultsRoot 'ni-linux-container-capture.json'
          if (-not (Test-Path -LiteralPath $capturePath -PathType Leaf)) {
            throw "NI Linux capture was not created: $capturePath"
          }
          $capture = Get-Content -LiteralPath $capturePath -Raw | ConvertFrom-Json -Depth 12
          $gateOutcome = if ($capture.PSObject.Properties['gateOutcome']) { [string]$capture.gateOutcome } else { '' }
          $resultClass = if ($capture.PSObject.Properties['resultClass']) { [string]$capture.resultClass } else { '' }
          Write-Host ("[ni-linux-hosted] compareExit={0} gateOutcome={1} resultClass={2} status={3}" -f $compareExit, $gateOutcome, $resultClass, $capture.status)
          if ($compareExit -ne 0 -and $gateOutcome -ne 'pass') {
            throw ("NI Linux image compare failed. compareExit={0} gateOutcome={1} resultClass={2} status={3} captureExit={4} message={5}" -f $compareExit, $gateOutcome, $resultClass, $capture.status, $capture.exitCode, $capture.message)
          }

      - name: Pull NI Windows image (hosted validation)
        if: runner.os == 'Windows'
        shell: pwsh
        run: docker pull nationalinstruments/labview:2026q1-windows

      - name: NI Windows image compare validation (hosted)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $resultsRoot = 'tests/results/release-validate/windows'
          New-Item -ItemType Directory -Path $resultsRoot -Force | Out-Null
          $reportPath = Join-Path $resultsRoot 'ni-windows-compare-report.html'
          $runtimeSnapshot = Join-Path $resultsRoot 'runtime-manager-windows.json'

          & ./tools/Run-NIWindowsContainerCompare.ps1 `
            -BaseVi 'fixtures/vi-stage/control-rename/Base.vi' `
            -HeadVi 'fixtures/vi-stage/control-rename/Head.vi' `
            -Image 'nationalinstruments/labview:2026q1-windows' `
            -ReportPath $reportPath `
            -TimeoutSeconds 300 `
            -AutoRepairRuntime:$true `
            -RuntimeEngineReadyTimeoutSeconds 120 `
            -RuntimeEngineReadyPollSeconds 3 `
            -RuntimeSnapshotPath $runtimeSnapshot
          $compareExit = $LASTEXITCODE

          $capturePath = Join-Path $resultsRoot 'ni-windows-container-capture.json'
          if (-not (Test-Path -LiteralPath $capturePath -PathType Leaf)) {
            throw "NI Windows capture was not created: $capturePath"
          }
          $capture = Get-Content -LiteralPath $capturePath -Raw | ConvertFrom-Json -Depth 12
          $gateOutcome = if ($capture.PSObject.Properties['gateOutcome']) { [string]$capture.gateOutcome } else { '' }
          $resultClass = if ($capture.PSObject.Properties['resultClass']) { [string]$capture.resultClass } else { '' }
          Write-Host ("[ni-windows-hosted] compareExit={0} gateOutcome={1} resultClass={2} status={3}" -f $compareExit, $gateOutcome, $resultClass, $capture.status)
          if ($compareExit -ne 0 -and $gateOutcome -ne 'pass') {
            throw ("NI Windows image compare failed. compareExit={0} gateOutcome={1} resultClass={2} status={3} captureExit={4} message={5}" -f $compareExit, $gateOutcome, $resultClass, $capture.status, $capture.exitCode, $capture.message)
          }

  release-vi-history-profile:
    runs-on: ubuntu-latest
    outputs:
      profile: ${{ steps.resolve.outputs.profile }}
      matrix: ${{ steps.resolve.outputs.matrix }}
      scenario_count: ${{ steps.resolve.outputs.scenario_count }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install npm dependencies
        shell: pwsh
        run: |
          node tools/npm/cli.mjs ci --no-audit --no-fund

      - name: Validate release VI history profile manifest schema
        shell: pwsh
        run: |
          node tools/npm/run-script.mjs release:vi-history:profiles:schema

      - name: Validate release VI history policy schema
        shell: pwsh
        run: |
          node tools/npm/run-script.mjs release:vi-history:policy:schema

      - name: Resolve release VI history profile matrix
        id: resolve
        shell: pwsh
        run: |
          $manifestPath = 'configs/release-vi-history-profiles.json'
          if (-not (Test-Path -LiteralPath $manifestPath -PathType Leaf)) {
            throw "Release VI history profile manifest not found: $manifestPath"
          }

          $manifest = Get-Content -LiteralPath $manifestPath -Raw | ConvertFrom-Json -Depth 30
          if (-not $manifest) {
            throw "Failed to parse manifest: $manifestPath"
          }

          $requestedRaw = '${{ vars.RELEASE_VI_HISTORY_PROFILE }}'
          $requested = if ([string]::IsNullOrWhiteSpace($requestedRaw)) { '' } else { $requestedRaw.Trim() }
          $defaultProfile = [string]$manifest.defaultProfile
          if ([string]::IsNullOrWhiteSpace($defaultProfile)) {
            throw 'Manifest defaultProfile is required.'
          }

          $profilesById = @{}
          foreach ($profile in @($manifest.profiles)) {
            $profileId = [string]$profile.id
            if ([string]::IsNullOrWhiteSpace($profileId)) {
              throw 'Manifest profile id must not be empty.'
            }
            $profilesById[$profileId] = $profile
          }

          if (-not $profilesById.ContainsKey($defaultProfile)) {
            throw "Manifest defaultProfile '$defaultProfile' does not exist in profiles list."
          }

          $selectedProfileId = if ([string]::IsNullOrWhiteSpace($requested)) { $defaultProfile } else { $requested }
          if (-not $profilesById.ContainsKey($selectedProfileId)) {
            Write-Host "::warning::Unknown RELEASE_VI_HISTORY_PROFILE '$requested'; falling back to '$defaultProfile'."
            $selectedProfileId = $defaultProfile
          }

          $selectedProfile = $profilesById[$selectedProfileId]
          $scenarios = @($selectedProfile.scenarios)
          $osTargets = @($manifest.osTargets)
          if ($scenarios.Count -eq 0) {
            throw "Selected profile '$selectedProfileId' has no scenarios."
          }
          if ($osTargets.Count -eq 0) {
            throw 'Manifest has no osTargets entries.'
          }

          $rows = [System.Collections.Generic.List[object]]::new()
          foreach ($osTarget in $osTargets) {
            $osId = [string]$osTarget.id
            $runner = [string]$osTarget.runner
            $image = [string]$osTarget.image
            foreach ($scenario in $scenarios) {
              $rows.Add([ordered]@{
                os = $runner
                os_label = $osId
                image = $image
                scenario = [string]$scenario.id
                flags = [string]$scenario.flags
              }) | Out-Null
            }
          }

          if ($rows.Count -eq 0) {
            throw "No matrix rows produced for profile '$selectedProfileId'."
          }

          $matrixObj = [ordered]@{ include = @($rows) }
          $matrixJson = $matrixObj | ConvertTo-Json -Depth 20 -Compress
          $scenarioCount = $rows.Count

          "profile=$selectedProfileId" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "scenario_count=$scenarioCount" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "matrix=$matrixJson" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

          if ($env:GITHUB_STEP_SUMMARY) {
            @(
              '### Release VI History Profile',
              '',
              "- Requested: $([string]::IsNullOrWhiteSpace($requested) ? '(empty)' : $requested)",
              "- Selected: $selectedProfileId",
              "- Matrix rows: $scenarioCount"
            ) -join "`n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          }

  release-vi-history-review:
    runs-on: ${{ matrix.os }}
    needs: [release, release-vi-history-profile]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.release-vi-history-profile.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v5

      - name: Pull NI image for scenario
        shell: pwsh
        run: docker pull '${{ matrix.image }}'

      - name: Run VI history review scenario
        shell: pwsh
        run: |
          $resultsRoot = Join-Path 'tests/results/release-vi-history' ('{0}/{1}' -f '${{ matrix.os_label }}', '${{ matrix.scenario }}')
          New-Item -ItemType Directory -Path $resultsRoot -Force | Out-Null

          $reportPath = Join-Path $resultsRoot 'compare-report.html'
          $runtimeSnapshot = Join-Path $resultsRoot 'runtime-manager.json'
          $flagsRaw = '${{ matrix.flags }}'
          $flags = @()
          if (-not [string]::IsNullOrWhiteSpace($flagsRaw)) {
            $flags = @($flagsRaw.Split(' ', [System.StringSplitOptions]::RemoveEmptyEntries))
          }

          if ('${{ matrix.os_label }}' -eq 'linux') {
            $args = @(
              '-BaseVi', 'fixtures/vi-stage/control-rename/Base.vi',
              '-HeadVi', 'fixtures/vi-stage/control-rename/Head.vi',
              '-Image', '${{ matrix.image }}',
              '-ReportPath', $reportPath,
              '-TimeoutSeconds', '300',
              '-AutoRepairRuntime:$true',
              '-RuntimeEngineReadyTimeoutSeconds', '120',
              '-RuntimeEngineReadyPollSeconds', '3',
              '-RuntimeSnapshotPath', $runtimeSnapshot
            )
            if ($flags.Count -gt 0) {
              $args += '-Flags'
              $args += $flags
            }
            & ./tools/Run-NILinuxContainerCompare.ps1 @args
            $compareExit = $LASTEXITCODE
            $capturePath = Join-Path $resultsRoot 'ni-linux-container-capture.json'
          } else {
            $args = @(
              '-BaseVi', 'fixtures/vi-stage/control-rename/Base.vi',
              '-HeadVi', 'fixtures/vi-stage/control-rename/Head.vi',
              '-Image', '${{ matrix.image }}',
              '-ReportPath', $reportPath,
              '-TimeoutSeconds', '300',
              '-AutoRepairRuntime:$true',
              '-RuntimeEngineReadyTimeoutSeconds', '120',
              '-RuntimeEngineReadyPollSeconds', '3',
              '-RuntimeSnapshotPath', $runtimeSnapshot
            )
            if ($flags.Count -gt 0) {
              $args += '-Flags'
              $args += $flags
            }
            & ./tools/Run-NIWindowsContainerCompare.ps1 @args
            $compareExit = $LASTEXITCODE
            $capturePath = Join-Path $resultsRoot 'ni-windows-container-capture.json'
          }

          if (-not (Test-Path -LiteralPath $capturePath -PathType Leaf)) {
            throw "Expected capture file was not created: $capturePath"
          }

          $capture = Get-Content -LiteralPath $capturePath -Raw | ConvertFrom-Json -Depth 12
          $gateOutcome = if ($capture.PSObject.Properties['gateOutcome']) { [string]$capture.gateOutcome } else { '' }
          $resultClass = if ($capture.PSObject.Properties['resultClass']) { [string]$capture.resultClass } else { '' }
          $captureExit = if ($capture.PSObject.Properties['exitCode']) { [int]$capture.exitCode } else { -1 }

          $summary = [ordered]@{
            schema = 'release-vi-history-review/scenario@v1'
            generatedAt = (Get-Date).ToUniversalTime().ToString('o')
            tag = '${{ github.ref_name }}'
            os = '${{ matrix.os_label }}'
            scenario = '${{ matrix.scenario }}'
            flags = if ($flags.Count -gt 0) { ($flags -join ' ') } else { '' }
            image = '${{ matrix.image }}'
            compareExit = $compareExit
            captureExit = $captureExit
            gateOutcome = $gateOutcome
            resultClass = $resultClass
            status = [string]$capture.status
            message = [string]$capture.message
            reportPath = $reportPath
            reportExists = [bool](Test-Path -LiteralPath $reportPath -PathType Leaf)
            capturePath = $capturePath
          }
          $summaryPath = Join-Path $resultsRoot 'scenario-summary.json'
          $summary | ConvertTo-Json -Depth 12 | Set-Content -LiteralPath $summaryPath -Encoding utf8

          Write-Host ("[release-vi-history-review] os={0} scenario={1} compareExit={2} gateOutcome={3} resultClass={4} status={5}" -f '${{ matrix.os_label }}','${{ matrix.scenario }}',$compareExit,$gateOutcome,$resultClass,$summary.status)
          if ($compareExit -ne 0 -and $gateOutcome -ne 'pass') {
            throw ("Release VI history scenario failed hard (os={0}, scenario={1}, compareExit={2}, gateOutcome={3}, resultClass={4}, status={5})." -f '${{ matrix.os_label }}','${{ matrix.scenario }}',$compareExit,$gateOutcome,$resultClass,$summary.status)
          }

      - name: Upload VI history review artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: release-vi-history-${{ matrix.os_label }}-${{ matrix.scenario }}
          path: tests/results/release-vi-history/${{ matrix.os_label }}/${{ matrix.scenario }}/**
          if-no-files-found: warn

  release-vi-history-review-index:
    runs-on: ubuntu-latest
    needs: [release-vi-history-review, release-vi-history-profile]
    if: always()
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install npm dependencies
        shell: pwsh
        run: |
          node tools/npm/cli.mjs ci --no-audit --no-fund

      - name: Download VI history review artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-vi-history-*
          path: vi-history-review
          merge-multiple: false

      - name: Build review index
        shell: pwsh
        run: |
          $indexDir = 'tests/results/release-vi-history-index'
          New-Item -ItemType Directory -Path $indexDir -Force | Out-Null
          $indexPath = Join-Path $indexDir 'release-vi-history-review.md'
          $jsonPath = Join-Path $indexDir 'release-vi-history-review.json'

          $summaryFiles = Get-ChildItem -Path 'vi-history-review' -Filter 'scenario-summary.json' -Recurse -File -ErrorAction SilentlyContinue
          $rows = foreach ($file in $summaryFiles) {
            try {
              $payload = Get-Content -LiteralPath $file.FullName -Raw | ConvertFrom-Json -Depth 12
              [pscustomobject]@{
                os = [string]$payload.os
                scenario = [string]$payload.scenario
                flags = [string]$payload.flags
                status = [string]$payload.status
                gateOutcome = [string]$payload.gateOutcome
                resultClass = [string]$payload.resultClass
                compareExit = [string]$payload.compareExit
                reportExists = [string]$payload.reportExists
                artifactPath = $file.FullName
              }
            } catch {
              [pscustomobject]@{
                os = 'unknown'
                scenario = 'unknown'
                flags = ''
                status = 'parse-error'
                gateOutcome = ''
                resultClass = ''
                compareExit = ''
                reportExists = ''
                artifactPath = $file.FullName
              }
            }
          }

          $lines = [System.Collections.Generic.List[string]]::new()
          $lines.Add('# Release VI History Review Index') | Out-Null
          $lines.Add('') | Out-Null
          $lines.Add(('Profile: `{0}` ({1} rows)' -f '${{ needs.release-vi-history-profile.outputs.profile }}', '${{ needs.release-vi-history-profile.outputs.scenario_count }}')) | Out-Null
          $lines.Add('') | Out-Null
          $lines.Add(('Run: https://github.com/{0}/actions/runs/{1}' -f '${{ github.repository }}', '${{ github.run_id }}')) | Out-Null
          $lines.Add('') | Out-Null
          $lines.Add('| OS | Scenario | Flags | Status | Gate | Result Class | Compare Exit | Report Exists |') | Out-Null
          $lines.Add('|---|---|---|---|---|---|---:|---|') | Out-Null

          if (-not $rows -or $rows.Count -eq 0) {
            $lines.Add('| n/a | n/a | n/a | no-artifacts | n/a | n/a | n/a | n/a |') | Out-Null
          } else {
            foreach ($row in @($rows | Sort-Object os, scenario)) {
              $lines.Add(("| {0} | {1} | `{2}` | {3} | {4} | {5} | {6} | {7} |" -f $row.os, $row.scenario, $row.flags, $row.status, $row.gateOutcome, $row.resultClass, $row.compareExit, $row.reportExists)) | Out-Null
            }
          }

          $rows | ConvertTo-Json -Depth 12 | Set-Content -LiteralPath $jsonPath -Encoding utf8
          $lines -join "`n" | Set-Content -LiteralPath $indexPath -Encoding utf8
          Get-Content -LiteralPath $indexPath | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

      - name: Validate release VI history review schemas
        shell: pwsh
        run: |
          node tools/npm/run-script.mjs release:vi-history:policy:schema
          node tools/npm/run-script.mjs release:vi-history:schema

      - name: Evaluate release VI history policy gate
        shell: pwsh
        run: |
          $policyPath = 'configs/release-vi-history-policy.json'
          $indexPath = 'tests/results/release-vi-history-index/release-vi-history-review.json'
          $policySummaryPath = 'tests/results/release-vi-history-index/release-vi-history-policy.json'
          $selectedProfile = '${{ needs.release-vi-history-profile.outputs.profile }}'

          if (-not (Test-Path -LiteralPath $policyPath -PathType Leaf)) {
            throw "Policy file not found: $policyPath"
          }
          if (-not (Test-Path -LiteralPath $indexPath -PathType Leaf)) {
            throw "Review index file not found: $indexPath"
          }

          $policy = Get-Content -LiteralPath $policyPath -Raw | ConvertFrom-Json -Depth 20
          $rows = @(Get-Content -LiteralPath $indexPath -Raw | ConvertFrom-Json -Depth 20)
          $requiredOs = @($policy.requiredOs | ForEach-Object { [string]$_ })
          $allowedGateOutcomes = @($policy.allowedGateOutcomes | ForEach-Object { [string]$_ })
          $allowedResultClasses = @($policy.allowedResultClasses | ForEach-Object { [string]$_ })

          $profilePolicy = $null
          foreach ($candidate in @($policy.profilePolicies)) {
            if ([string]$candidate.profile -eq $selectedProfile) {
              $profilePolicy = $candidate
              break
            }
          }
          if (-not $profilePolicy) {
            $profilePolicy = $policy.defaultProfilePolicy
          }

          $mode = [string]$profilePolicy.mode
          if ($mode -notin @('strict', 'warn')) {
            throw "Unsupported policy mode '$mode'."
          }
          $requiredScenarios = @($profilePolicy.requiredScenarios | ForEach-Object { [string]$_ })
          if ($requiredScenarios.Count -eq 0) {
            throw 'Policy requiredScenarios is empty.'
          }

          $violations = [System.Collections.Generic.List[object]]::new()
          foreach ($osValue in $requiredOs) {
            foreach ($scenarioValue in $requiredScenarios) {
              $matchingRows = @($rows | Where-Object {
                ([string]$_.os -eq $osValue) -and ([string]$_.scenario -eq $scenarioValue)
              })

              if ($matchingRows.Count -eq 0) {
                $violations.Add([ordered]@{
                  os = $osValue
                  scenario = $scenarioValue
                  reason = 'missing-row'
                  detail = 'No row found for required os/scenario pair.'
                }) | Out-Null
                continue
              }

              foreach ($row in $matchingRows) {
                $gate = [string]$row.gateOutcome
                $resultClass = [string]$row.resultClass

                if ($gate -notin $allowedGateOutcomes) {
                  $violations.Add([ordered]@{
                    os = $osValue
                    scenario = $scenarioValue
                    reason = 'gate-outcome'
                    detail = "gateOutcome '$gate' is not allowed."
                  }) | Out-Null
                }

                if ($resultClass -notin $allowedResultClasses) {
                  $violations.Add([ordered]@{
                    os = $osValue
                    scenario = $scenarioValue
                    reason = 'result-class'
                    detail = "resultClass '$resultClass' is not allowed."
                  }) | Out-Null
                }
              }
            }
          }

          $outcome = if ($violations.Count -eq 0) { 'pass' } elseif ($mode -eq 'strict') { 'fail' } else { 'warn' }
          $summary = [ordered]@{
            schema = 'release-vi-history/policy-result@v1'
            generatedAt = (Get-Date).ToUniversalTime().ToString('o')
            profile = $selectedProfile
            mode = $mode
            requiredOs = @($requiredOs)
            requiredScenarios = @($requiredScenarios)
            allowedGateOutcomes = @($allowedGateOutcomes)
            allowedResultClasses = @($allowedResultClasses)
            rowCount = $rows.Count
            violationCount = $violations.Count
            outcome = $outcome
            violations = @($violations)
          }
          $summary | ConvertTo-Json -Depth 20 | Set-Content -LiteralPath $policySummaryPath -Encoding utf8

          if ($env:GITHUB_STEP_SUMMARY) {
            @(
              '### Release VI History Policy Gate',
              '',
              "- Profile: $selectedProfile",
              "- Mode: $mode",
              "- Outcome: $outcome",
              "- Violations: $($violations.Count)",
              "- Required scenarios: $($requiredScenarios -join ', ')"
            ) -join "`n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          }

          if ($outcome -eq 'fail') {
            throw "Release VI history policy gate failed with $($violations.Count) violation(s)."
          }

      - name: Upload review index artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: release-vi-history-review-index
          path: tests/results/release-vi-history-index/**
          if-no-files-found: warn
