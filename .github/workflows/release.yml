name: Release on tag

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write
    outputs:
      cli_version: ${{ steps.meta.outputs.cli_version }}
    steps:
      - uses: actions/checkout@v5

      - name: Build release notes from CHANGELOG
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          awk -v tag="$TAG" '
            $0 ~ "^##[[:space:]]*\\[?" tag "\\]?$" {print; in=1; next}
            in && $0 ~ "^##[[:space:]]*\\[" {exit}
            in && $0 ~ "^##[[:space:]]*v?[0-9]" {exit}
            in {print}
          ' CHANGELOG.md > RELEASE_NOTES.md || true
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "No changelog section found for $TAG. Falling back to auto-generated notes." | tee RELEASE_NOTES.md
            echo "fallback=true" >> "$GITHUB_OUTPUT"
          else
            echo "fallback=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Compute CLI version
        id: meta
        shell: pwsh
        run: |
          [xml]$xml = Get-Content -Raw Directory.Build.props
          $ver = $xml.Project.PropertyGroup.Version
          if (-not $ver) { $ver = '0.0.0' }
          "cli_version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Publish CLI artifacts
        shell: pwsh
        run: pwsh -File tools/Publish-Cli.ps1

      - name: Generate SBOM (SPDX)
        shell: pwsh
        run: pwsh -NoLogo -NoProfile -File tools/Generate-ReleaseSbom.ps1 -ArtifactsRoot artifacts/cli -OutputPath sbom.spdx.json

      - name: Generate provenance metadata
        shell: pwsh
        run: pwsh -NoLogo -NoProfile -File tools/Generate-ReleaseProvenance.ps1 -ArtifactsRoot artifacts/cli -OutputPath provenance.json

      - name: Upload workflow artifact (CLI)
        uses: actions/upload-artifact@v5
        with:
          name: cli-artifacts
          path: |
            artifacts/cli/*.zip
            artifacts/cli/*.tar.gz
            artifacts/cli/SHA256SUMS.txt
            artifacts/cli/sbom.spdx.json
            artifacts/cli/provenance.json
          if-no-files-found: error

      - name: Attest release assets provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            artifacts/cli/*.zip
            artifacts/cli/*.tar.gz
            artifacts/cli/SHA256SUMS.txt
            artifacts/cli/sbom.spdx.json
            artifacts/cli/provenance.json

      - name: Create GitHub Release with assets (CHANGELOG)
        if: steps.notes.outputs.fallback == 'false'
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            artifacts/cli/*.zip
            artifacts/cli/*.tar.gz
            artifacts/cli/SHA256SUMS.txt
            artifacts/cli/sbom.spdx.json
            artifacts/cli/provenance.json

      - name: Create GitHub Release with assets (auto notes)
        if: steps.notes.outputs.fallback == 'true'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/cli/*.zip
            artifacts/cli/*.tar.gz
            artifacts/cli/SHA256SUMS.txt
            artifacts/cli/sbom.spdx.json
            artifacts/cli/provenance.json

  validate-cli-artifacts:
    runs-on: ${{ matrix.os }}
    needs: release
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    steps:
      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          name: cli-artifacts
          path: cli-dl

      - name: Extract artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $v = '${{ needs.release.outputs.cli_version }}'
          $zip = Get-ChildItem -Recurse -Path cli-dl -Filter "comparevi-cli-v$($v)-win-x64-selfcontained.zip" | Select-Object -First 1
          if (-not $zip) { throw "Artifact not found for Windows" }
          Expand-Archive -Path $zip.FullName -DestinationPath cli-out
          Get-ChildItem cli-out | Out-Host

      - name: Verify checksum (Windows)
        id: checksum_windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $v = '${{ needs.release.outputs.cli_version }}'
          $zip = Get-ChildItem -Recurse -Path cli-dl -Filter "comparevi-cli-v$($v)-win-x64-selfcontained.zip" | Select-Object -First 1
          if (-not $zip) { throw "Artifact not found for Windows" }
          $sumPath = Join-Path 'cli-dl' 'SHA256SUMS.txt'
          if (-not (Test-Path $sumPath)) { throw "Missing SHA256SUMS.txt" }
          $entries = @()
          foreach ($line in Get-Content $sumPath) {
            if ($line -match '^([0-9a-fA-F]{64})\s+(.+)$') {
              $entries += [pscustomobject]@{ Hash = $matches[1].ToLower(); Path = $matches[2].Trim(); Name = (Split-Path -Leaf $matches[2].Trim()) }
            }
          }
          if (-not $entries) { throw "No checksums parsed" }
          $expected = ($entries | Where-Object { $_.Name -eq $zip.Name } | Select-Object -First 1)
          if (-not $expected) { throw "No checksum entry found for $($zip.Name)" }
          $actual = (Get-FileHash -Algorithm SHA256 $zip.FullName).Hash.ToLower()
          if ($actual -ne $expected.Hash) { throw "SHA256 mismatch for $($zip.Name). expected=$($expected.Hash) actual=$actual" }
          Write-Host "Checksum OK for $($zip.Name)"

      - name: Extract artifact (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          v='${{ needs.release.outputs.cli_version }}'
          tarball=$(ls -1 cli-dl/comparevi-cli-v${v}-linux-x64-selfcontained.tar.gz)
          mkdir -p cli-out
          tar -xzf "$tarball" -C cli-out
          ls -la cli-out

      - name: Verify checksum (Linux)
        id: checksum_linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          v='${{ needs.release.outputs.cli_version }}'
          file="comparevi-cli-v${v}-linux-x64-selfcontained.tar.gz"
          tarball="cli-dl/${file}"
          [ -f "$tarball" ]
          expected=$(awk -v file="$file" '$2 ~ file {print tolower($1)}' cli-dl/SHA256SUMS.txt)
          [ -n "$expected" ]
          actual=$(sha256sum "$tarball" | awk '{print tolower($1)}')
          if [ "$actual" != "$expected" ]; then
            echo "Checksum mismatch for $file: expected=$expected actual=$actual"
            exit 1
          fi
          echo "Checksum OK for $file"

      - name: Extract artifact (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          v='${{ needs.release.outputs.cli_version }}'
          tarball=$(ls -1 cli-dl/comparevi-cli-v${v}-osx-x64-selfcontained.tar.gz)
          mkdir -p cli-out
          tar -xzf "$tarball" -C cli-out
          ls -la cli-out

      - name: Verify checksum (macOS)
        id: checksum_macos
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          v='${{ needs.release.outputs.cli_version }}'
          file="comparevi-cli-v${v}-osx-x64-selfcontained.tar.gz"
          tarball="cli-dl/${file}"
          [ -f "$tarball" ]
          expected=$(awk -v file="$file" '$2 ~ file {print tolower($1)}' cli-dl/SHA256SUMS.txt)
          [ -n "$expected" ]
          actual=$(shasum -a 256 "$tarball" | awk '{print tolower($1)}')
          if [ "$actual" != "$expected" ]; then
            echo "Checksum mismatch for $file: expected=$expected actual=$actual"
            exit 1
          fi
          echo "Checksum OK for $file"

      - name: Smoke run (Windows)
        id: smoke_windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exe = Resolve-Path 'cli-out/comparevi-cli.exe'
          $v = & $exe version | ConvertFrom-Json
          if ($v.name -ne 'comparevi-cli') { throw "Unexpected name: $($v.name)" }
          $tok = & $exe tokenize --input 'foo -x=1 "bar baz"' | ConvertFrom-Json
          if (-not ($tok.normalized -contains '-x' -and $tok.normalized -contains '1')) { throw 'Tokenize validation failed' }
          & $exe procs | Out-Null

      - name: Smoke run (Linux/macOS)
        id: smoke_unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          bin="cli-out/comparevi-cli"
          # Ensure executable (tarballs from Windows builds may need this)
          chmod +x "$bin" || true
          ver_json=$("$bin" version)
          node -e "const o=JSON.parse(process.argv[1]); if(o.name!=='comparevi-cli') {throw new Error('bad name') }" "$ver_json"
          tok_json=$("$bin" tokenize --input 'foo -x=1 "bar baz"')
          node -e "const o=JSON.parse(process.argv[1]); if(!o.normalized.includes('-x')||!o.normalized.includes('1')) throw new Error('bad tokenize')" "$tok_json"
          "$bin" procs >/dev/null

      - name: Write release review scenario summary
        if: always()
        shell: pwsh
        run: |
          $os = '${{ matrix.os }}'
          $tag = '${{ github.ref_name }}'
          $checksum = 'none'
          $smoke = 'none'

          switch ($os) {
            'windows-latest' {
              $checksum = '${{ steps.checksum_windows.outcome }}'
              $smoke = '${{ steps.smoke_windows.outcome }}'
            }
            'ubuntu-latest' {
              $checksum = '${{ steps.checksum_linux.outcome }}'
              $smoke = '${{ steps.smoke_unix.outcome }}'
            }
            'macos-latest' {
              $checksum = '${{ steps.checksum_macos.outcome }}'
              $smoke = '${{ steps.smoke_unix.outcome }}'
            }
          }

          $outDir = 'tests/results/release-review'
          New-Item -ItemType Directory -Path $outDir -Force | Out-Null
          $outPath = Join-Path $outDir ("scenario-summary-{0}.json" -f $os)

          pwsh -NoLogo -NoProfile -File tools/release-review/Write-ReleaseReviewScenarioSummary.ps1 `
            -Os $os `
            -Tag $tag `
            -ChecksumOutcome $checksum `
            -SmokeOutcome $smoke `
            -OutputPath $outPath

      - name: Validate release review scenario schema
        if: always()
        shell: pwsh
        run: |
          $os = '${{ matrix.os }}'
          $jsonPath = Join-Path 'tests/results/release-review' ("scenario-summary-{0}.json" -f $os)
          pwsh -NoLogo -NoProfile -File tools/Invoke-JsonSchemaLite.ps1 `
            -JsonPath $jsonPath `
            -SchemaPath 'docs/schemas/release-review-scenario-summary-v1.schema.json'

      - name: Upload release review scenario summary
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: release-review-scenario-${{ matrix.os }}
          path: tests/results/release-review/scenario-summary-${{ matrix.os }}.json
          if-no-files-found: error

  release-review-index:
    runs-on: ubuntu-latest
    needs: [release, validate-cli-artifacts]
    if: always()
    steps:
      - uses: actions/checkout@v5

      - name: Download release review scenario artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: release-review-scenario-*
          merge-multiple: true
          path: tests/results/release-review/scenarios

      - name: Evaluate release review policy and build index
        shell: pwsh
        run: |
          pwsh -NoLogo -NoProfile -File tools/release-review/Evaluate-ReleaseReviewPolicy.ps1 `
            -ScenarioRoot 'tests/results/release-review/scenarios' `
            -ProfilePath 'tools/release-review/scenario-profiles.json' `
            -PolicyPath 'tools/policy/release-review-gates.json' `
            -Tag '${{ github.ref_name }}' `
            -OutputIndexPath 'tests/results/release-review/review-index.json' `
            -OutputCommentPath 'tests/results/release-review/reviewer-comment.md'

      - name: Validate release review index schema
        shell: pwsh
        run: |
          pwsh -NoLogo -NoProfile -File tools/Invoke-JsonSchemaLite.ps1 `
            -JsonPath 'tests/results/release-review/review-index.json' `
            -SchemaPath 'docs/schemas/release-review-index-v1.schema.json'

      - name: Validate scenario schema set
        shell: pwsh
        run: |
          Get-ChildItem -LiteralPath 'tests/results/release-review/scenarios' -Filter '*.json' -File |
            ForEach-Object {
              pwsh -NoLogo -NoProfile -File tools/Invoke-JsonSchemaLite.ps1 `
                -JsonPath $_.FullName `
                -SchemaPath 'docs/schemas/release-review-scenario-summary-v1.schema.json'
            }

      - name: Publish reviewer summary block
        shell: bash
        run: |
          set -euo pipefail
          if [ -f tests/results/release-review/reviewer-comment.md ]; then
            cat tests/results/release-review/reviewer-comment.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload release review index artifacts
        uses: actions/upload-artifact@v5
        with:
          name: release-review-index
          path: |
            tests/results/release-review/review-index.json
            tests/results/release-review/reviewer-comment.md
            tests/results/release-review/scenarios/*.json
          if-no-files-found: error
