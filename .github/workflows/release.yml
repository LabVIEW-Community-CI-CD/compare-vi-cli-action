name: Release on tag

on:
  push:
    tags:
      - 'v*'

jobs:
  certification-matrix:
    name: certification-matrix
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      channel: ${{ steps.channel.outputs.channel }}
    steps:
      - uses: actions/checkout@v5

      - name: Resolve release channel
        id: channel
        shell: bash
        run: |
          set -euo pipefail
          channel="stable"
          if [[ "${GITHUB_REF_NAME}" == *"-rc."* ]]; then
            channel="rc"
          fi
          echo "channel=${channel}" >> "$GITHUB_OUTPUT"

      - name: Generate certification matrix
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          node tools/priority/certification-matrix.mjs \
            --repo "${{ github.repository }}" \
            --channel "${{ steps.channel.outputs.channel }}" \
            --enforce stable \
            --policy tools/policy/certification-matrix.json \
            --output tests/results/_agent/certification/release-certification-matrix.json

      - name: Validate certification matrix schema
        shell: pwsh
        run: |
          pwsh -NoLogo -NoProfile -File tools/Invoke-JsonSchemaLite.ps1 \
            -JsonPath tests/results/_agent/certification/release-certification-matrix.json \
            -SchemaPath docs/schemas/certification-matrix-v1.schema.json

      - name: Upload certification matrix artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: certification-matrix-${{ github.run_id }}
          path: tests/results/_agent/certification/release-certification-matrix.json
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: certification-matrix
    environment:
      name: production
    permissions:
      contents: write
      attestations: write
      id-token: write
    outputs:
      cli_version: ${{ steps.meta.outputs.cli_version }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node 20
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Build release notes from CHANGELOG
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          awk -v tag="$TAG" '
            $0 ~ "^##[[:space:]]*\\[?" tag "\\]?$" {print; in=1; next}
            in && $0 ~ "^##[[:space:]]*\\[" {exit}
            in && $0 ~ "^##[[:space:]]*v?[0-9]" {exit}
            in {print}
          ' CHANGELOG.md > RELEASE_NOTES.md || true
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "No changelog section found for $TAG. Falling back to auto-generated notes." | tee RELEASE_NOTES.md
            echo "fallback=true" >> "$GITHUB_OUTPUT"
          else
            echo "fallback=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Compute CLI version
        id: meta
        shell: pwsh
        run: |
          [xml]$xml = Get-Content -Raw Directory.Build.props
          $ver = $xml.Project.PropertyGroup.Version
          if (-not $ver) { $ver = '0.0.0' }
          "cli_version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Publish CLI artifacts
        shell: pwsh
        run: pwsh -NoLogo -NoProfile -File tools/Publish-Cli.ps1 -CompareViSharedSource package-first -PrepareSharedPackageFeed -FailOnSharedFallback

      - name: Validate shared-source resolution schema
        shell: pwsh
        run: |
          pwsh -NoLogo -NoProfile -File tools/Invoke-JsonSchemaLite.ps1 \
            -JsonPath tests/results/_agent/release/shared-source-resolution.json \
            -SchemaPath docs/schemas/release-shared-source-resolution-v1.schema.json

      - name: Upload shared-source resolution artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: release-shared-source-resolution-${{ github.run_id }}
          path: tests/results/_agent/release/shared-source-resolution.json
          if-no-files-found: error

      - name: Generate SBOM (SPDX)
        shell: pwsh
        run: pwsh -NoLogo -NoProfile -File tools/Generate-ReleaseSbom.ps1 -ArtifactsRoot artifacts/cli -OutputPath sbom.spdx.json

      - name: Generate provenance metadata
        shell: pwsh
        run: pwsh -NoLogo -NoProfile -File tools/Generate-ReleaseProvenance.ps1 -ArtifactsRoot artifacts/cli -OutputPath provenance.json

      - name: Upload workflow artifact (CLI)
        uses: actions/upload-artifact@v5
        with:
          name: cli-artifacts
          path: |
            artifacts/cli/*.zip
            artifacts/cli/*.tar.gz
            artifacts/cli/SHA256SUMS.txt
            artifacts/cli/sbom.spdx.json
            artifacts/cli/provenance.json
            tests/results/_agent/release/shared-source-resolution.json
          if-no-files-found: error

      - name: Attest release assets provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            artifacts/cli/*.zip
            artifacts/cli/*.tar.gz
            artifacts/cli/SHA256SUMS.txt
            artifacts/cli/sbom.spdx.json
            artifacts/cli/provenance.json

      - name: Enforce supply-chain trust gate
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          node tools/priority/supply-chain-trust-gate.mjs \
            --repo "${{ github.repository }}" \
            --artifacts-root artifacts/cli \
            --checksums artifacts/cli/SHA256SUMS.txt \
            --sbom artifacts/cli/sbom.spdx.json \
            --provenance artifacts/cli/provenance.json \
            --signer-workflow "${{ github.repository }}/.github/workflows/release.yml" \
            --report tests/results/_agent/supply-chain/release-trust-gate.json

      - name: Validate supply-chain trust report schema
        if: always()
        shell: pwsh
        run: |
          pwsh -NoLogo -NoProfile -File tools/Invoke-JsonSchemaLite.ps1 \
            -JsonPath tests/results/_agent/supply-chain/release-trust-gate.json \
            -SchemaPath docs/schemas/supply-chain-trust-gate-v1.schema.json

      - name: Upload supply-chain trust artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: release-supply-chain-trust-${{ github.run_id }}
          path: tests/results/_agent/supply-chain/release-trust-gate.json
          if-no-files-found: error

      - name: Enforce rollback drill health gate
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          node tools/priority/rollback-drill-health.mjs \
            --repo "${{ github.repository }}" \
            --policy tools/policy/release-rollback-policy.json \
            --report tests/results/_agent/release/rollback-drill-health.json

      - name: Validate rollback drill health schema
        if: always()
        shell: pwsh
        run: |
          pwsh -NoLogo -NoProfile -File tools/Invoke-JsonSchemaLite.ps1 \
            -JsonPath tests/results/_agent/release/rollback-drill-health.json \
            -SchemaPath docs/schemas/release-rollback-drill-health-v1.schema.json

      - name: Upload rollback drill health artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: release-rollback-drill-health-${{ github.run_id }}
          path: tests/results/_agent/release/rollback-drill-health.json
          if-no-files-found: error

      - name: Create GitHub Release with assets (CHANGELOG)
        if: steps.notes.outputs.fallback == 'false'
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            artifacts/cli/*.zip
            artifacts/cli/*.tar.gz
            artifacts/cli/SHA256SUMS.txt
            artifacts/cli/sbom.spdx.json
            artifacts/cli/provenance.json

      - name: Create GitHub Release with assets (auto notes)
        if: steps.notes.outputs.fallback == 'true'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/cli/*.zip
            artifacts/cli/*.tar.gz
            artifacts/cli/SHA256SUMS.txt
            artifacts/cli/sbom.spdx.json
            artifacts/cli/provenance.json

  validate-cli-artifacts:
    runs-on: ${{ matrix.os }}
    needs: release
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    steps:
      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          name: cli-artifacts
          path: cli-dl

      - name: Extract artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $v = '${{ needs.release.outputs.cli_version }}'
          $zip = Get-ChildItem -Recurse -Path cli-dl -Filter "comparevi-cli-v$($v)-win-x64-selfcontained.zip" | Select-Object -First 1
          if (-not $zip) { throw "Artifact not found for Windows" }
          Expand-Archive -Path $zip.FullName -DestinationPath cli-out
          Get-ChildItem cli-out | Out-Host

      - name: Verify checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $v = '${{ needs.release.outputs.cli_version }}'
          $zip = Get-ChildItem -Recurse -Path cli-dl -Filter "comparevi-cli-v$($v)-win-x64-selfcontained.zip" | Select-Object -First 1
          if (-not $zip) { throw "Artifact not found for Windows" }
          $sumPath = Join-Path 'cli-dl' 'SHA256SUMS.txt'
          if (-not (Test-Path $sumPath)) { throw "Missing SHA256SUMS.txt" }
          $entries = @()
          foreach ($line in Get-Content $sumPath) {
            if ($line -match '^([0-9a-fA-F]{64})\s+(.+)$') {
              $entries += [pscustomobject]@{ Hash = $matches[1].ToLower(); Path = $matches[2].Trim(); Name = (Split-Path -Leaf $matches[2].Trim()) }
            }
          }
          if (-not $entries) { throw "No checksums parsed" }
          $expected = ($entries | Where-Object { $_.Name -eq $zip.Name } | Select-Object -First 1)
          if (-not $expected) { throw "No checksum entry found for $($zip.Name)" }
          $actual = (Get-FileHash -Algorithm SHA256 $zip.FullName).Hash.ToLower()
          if ($actual -ne $expected.Hash) { throw "SHA256 mismatch for $($zip.Name). expected=$($expected.Hash) actual=$actual" }
          Write-Host "Checksum OK for $($zip.Name)"

      - name: Extract artifact (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          v='${{ needs.release.outputs.cli_version }}'
          tarball=$(ls -1 cli-dl/comparevi-cli-v${v}-linux-x64-selfcontained.tar.gz)
          mkdir -p cli-out
          tar -xzf "$tarball" -C cli-out
          ls -la cli-out

      - name: Verify checksum (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          v='${{ needs.release.outputs.cli_version }}'
          file="comparevi-cli-v${v}-linux-x64-selfcontained.tar.gz"
          tarball="cli-dl/${file}"
          [ -f "$tarball" ]
          expected=$(awk -v file="$file" '$2 ~ file {print tolower($1)}' cli-dl/SHA256SUMS.txt)
          [ -n "$expected" ]
          actual=$(sha256sum "$tarball" | awk '{print tolower($1)}')
          if [ "$actual" != "$expected" ]; then
            echo "Checksum mismatch for $file: expected=$expected actual=$actual"
            exit 1
          fi
          echo "Checksum OK for $file"

      - name: Extract artifact (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          v='${{ needs.release.outputs.cli_version }}'
          tarball=$(ls -1 cli-dl/comparevi-cli-v${v}-osx-x64-selfcontained.tar.gz)
          mkdir -p cli-out
          tar -xzf "$tarball" -C cli-out
          ls -la cli-out

      - name: Verify checksum (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          v='${{ needs.release.outputs.cli_version }}'
          file="comparevi-cli-v${v}-osx-x64-selfcontained.tar.gz"
          tarball="cli-dl/${file}"
          [ -f "$tarball" ]
          expected=$(awk -v file="$file" '$2 ~ file {print tolower($1)}' cli-dl/SHA256SUMS.txt)
          [ -n "$expected" ]
          actual=$(shasum -a 256 "$tarball" | awk '{print tolower($1)}')
          if [ "$actual" != "$expected" ]; then
            echo "Checksum mismatch for $file: expected=$expected actual=$actual"
            exit 1
          fi
          echo "Checksum OK for $file"

      - name: Smoke run (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exe = Resolve-Path 'cli-out/comparevi-cli.exe'
          $v = & $exe version | ConvertFrom-Json
          if ($v.name -ne 'comparevi-cli') { throw "Unexpected name: $($v.name)" }
          $tok = & $exe tokenize --input 'foo -x=1 "bar baz"' | ConvertFrom-Json
          if (-not ($tok.normalized -contains '-x' -and $tok.normalized -contains '1')) { throw 'Tokenize validation failed' }
          & $exe procs | Out-Null

      - name: Smoke run (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          bin="cli-out/comparevi-cli"
          # Ensure executable (tarballs from Windows builds may need this)
          chmod +x "$bin" || true
          ver_json=$("$bin" version)
          node -e "const o=JSON.parse(process.argv[1]); if(o.name!=='comparevi-cli') {throw new Error('bad name') }" "$ver_json"
          tok_json=$("$bin" tokenize --input 'foo -x=1 "bar baz"')
          node -e "const o=JSON.parse(process.argv[1]); if(!o.normalized.includes('-x')||!o.normalized.includes('1')) throw new Error('bad tokenize')" "$tok_json"
          "$bin" procs >/dev/null

  release-contract:
    name: release-contract
    runs-on: ubuntu-latest
    needs: [certification-matrix, release, validate-cli-artifacts]
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v5

      - name: Download certification matrix artifact
        uses: actions/download-artifact@v4
        with:
          name: certification-matrix-${{ github.run_id }}
          path: tests/results/_agent/certification

      - name: Download supply-chain trust artifact
        uses: actions/download-artifact@v4
        with:
          name: release-supply-chain-trust-${{ github.run_id }}
          path: tests/results/_agent/supply-chain

      - name: Download shared-source resolution artifact
        uses: actions/download-artifact@v4
        with:
          name: release-shared-source-resolution-${{ github.run_id }}
          path: tests/results/_agent/release

      - name: Download rollback drill health artifact
        uses: actions/download-artifact@v4
        with:
          name: release-rollback-drill-health-${{ github.run_id }}
          path: tests/results/_agent/release

      - name: Assert promotion contract alignment
        shell: pwsh
        run: |
          pwsh -NoLogo -NoProfile -File tools/Assert-PromotionContractAlignment.ps1 -OutputJsonPath tests/results/promotion-contract/release-alignment.json -StepSummaryPath $env:GITHUB_STEP_SUMMARY

      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          name: cli-artifacts
          path: cli-dl

      - name: Validate release provenance schema
        shell: pwsh
        run: |
          pwsh -NoLogo -NoProfile -File tools/Invoke-JsonSchemaLite.ps1 \
            -JsonPath cli-dl/provenance.json \
            -SchemaPath docs/schemas/run-provenance-v1.schema.json

      - name: Contract checksum scenario (Linux)
        id: checksum_scenario
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          v='${{ needs.release.outputs.cli_version }}'
          file="comparevi-cli-v${v}-linux-x64-selfcontained.tar.gz"
          tarball="cli-dl/${file}"
          [ -f "$tarball" ]
          expected=$(awk -v file="$file" '$2 ~ file {print tolower($1)}' cli-dl/SHA256SUMS.txt)
          [ -n "$expected" ]
          actual=$(sha256sum "$tarball" | awk '{print tolower($1)}')
          [ "$actual" = "$expected" ]

      - name: Contract smoke scenario (Linux)
        id: smoke_scenario
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          v='${{ needs.release.outputs.cli_version }}'
          tarball="cli-dl/comparevi-cli-v${v}-linux-x64-selfcontained.tar.gz"
          mkdir -p cli-contract
          tar -xzf "$tarball" -C cli-contract
          bin="cli-contract/comparevi-cli"
          chmod +x "$bin" || true
          ver_json=$($bin version)
          node -e "const o=JSON.parse(process.argv[1]); if(o.name!=='comparevi-cli') throw new Error('bad name')" "$ver_json"
          tok_json=$($bin tokenize --input 'foo -x=1 "bar baz"')
          node -e "const o=JSON.parse(process.argv[1]); if(!o.normalized.includes('-x')||!o.normalized.includes('1')) throw new Error('bad tokenize')" "$tok_json"
          $bin procs >/dev/null

      - name: Write release-review contract artifacts
        shell: pwsh
        run: |
          $checksumStatus = if ('${{ steps.checksum_scenario.outcome }}' -eq 'success') { 'pass' } else { 'fail' }
          $smokeStatus = if ('${{ steps.smoke_scenario.outcome }}' -eq 'success') { 'pass' } else { 'fail' }
          pwsh -NoLogo -NoProfile -File tools/Write-ReleaseReviewContractArtifacts.ps1 \
            -OutputDir tests/results/release-contract \
            -Tag '${{ github.ref_name }}' \
            -Os 'ubuntu-latest' \
            -ChecksumStatus $checksumStatus \
            -SmokeStatus $smokeStatus

      - name: Validate release-review artifacts schema
        shell: pwsh
        run: |
          pwsh -NoLogo -NoProfile -File tools/Invoke-JsonSchemaLite.ps1 \
            -JsonPath tests/results/release-contract/scenario-summary-ubuntu-latest.json \
            -SchemaPath docs/schemas/release-review-scenario-summary-v1.schema.json
          pwsh -NoLogo -NoProfile -File tools/Invoke-JsonSchemaLite.ps1 \
            -JsonPath tests/results/release-contract/review-index.json \
            -SchemaPath docs/schemas/release-review-index-v1.schema.json

      - name: Assert requirements-verification check contract
        shell: pwsh
        run: |
          pwsh -NoLogo -NoProfile -File tools/Assert-RequirementsVerificationCheckContract.ps1

      - name: Run requirements verification gate
        shell: pwsh
        run: |
          pwsh -NoLogo -NoProfile -File tools/Verify-RequirementsGate.ps1 \
            -TestsPath tests \
            -ResultsRoot tests/results \
            -OutDir tests/results/_agent/verification \
            -BaselinePolicyPath tools/policy/requirements-verification-baseline.json \
            -StepSummaryPath $env:GITHUB_STEP_SUMMARY

      - name: Enforce release contract outcome
        shell: bash
        run: |
          set -euo pipefail
          cs='${{ steps.checksum_scenario.outcome }}'
          sm='${{ steps.smoke_scenario.outcome }}'
          {
            echo "## Release Contract";
            echo "";
            echo "- Checksum scenario: **${cs}**";
            echo "- Smoke scenario: **${sm}**";
            echo "- Artifacts: tests/results/release-contract/scenario-summary-ubuntu-latest.json";
            echo "- Artifacts: tests/results/release-contract/review-index.json";
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$cs" != "success" ] || [ "$sm" != "success" ]; then
            echo "release-contract failed: one or more contract scenarios did not pass"
            exit 1
          fi

      - name: Write promotion evidence ledger
        if: always()
        shell: pwsh
        run: |
          $gateStatus = switch ('${{ job.status }}') {
            'success' { 'pass' }
            'cancelled' { 'blocked' }
            default { 'fail' }
          }
          $channel = if ('${{ github.ref_name }}' -match '-rc\.') { 'rc' } else { 'stable' }
          pwsh -NoLogo -NoProfile -File tools/Write-PromotionEvidenceLedger.ps1 -OutputPath tests/results/promotion-contract/release-ledger.json -WorkflowName '${{ github.workflow }}' -Stream 'comparevi-cli' -Channel $channel -Version '${{ needs.release.outputs.cli_version }}' -GateStatus $gateStatus -GateReason 'release-contract job result' -SummaryPath 'tests/results/release-contract/review-index.json' -StepSummaryPath $env:GITHUB_STEP_SUMMARY

      - name: Emit SLO metrics
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          node tools/priority/slo-metrics.mjs \
            --repo "${{ github.repository }}" \
            --output tests/results/_agent/slo/release-slo-metrics.json \
            --route-on-breach \
            --route-title-prefix "[SLO] Release promotion breach"

      - name: Upload release contract artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: release-contract-${{ github.run_id }}
          path: |
            tests/results/release-contract/scenario-summary-ubuntu-latest.json
            tests/results/release-contract/review-index.json
            tests/results/_agent/verification/verification-summary.json
            tests/results/promotion-contract/release-alignment.json
            tests/results/promotion-contract/release-ledger.json
            tests/results/_agent/slo/release-slo-metrics.json
            tests/results/_agent/certification/release-certification-matrix.json
            tests/results/_agent/supply-chain/release-trust-gate.json
            tests/results/_agent/release/rollback-drill-health.json
            tests/results/_agent/release/shared-source-resolution.json
          if-no-files-found: error
