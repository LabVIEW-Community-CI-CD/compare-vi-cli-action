name: Policy Guard (Upstream)

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main
      - develop
      - release/**
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main
      - develop
      - release/**
  merge_group:
    branches:
      - main
      - develop
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * 1'

concurrency:
  group: policy-guard-upstream-${{ ((github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.number) || github.ref }}
  cancel-in-progress: true

jobs:
  policy-guard:
    name: policy-guard
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout PR head
        if: github.event_name == 'pull_request_target'
        uses: actions/checkout@v5
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout repository
        if: github.event_name != 'pull_request_target'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Prepare policy guard token
        shell: pwsh
        env:
          INPUT_TOKEN_PRIMARY: ${{ secrets.GH_TOKEN }}
          INPUT_TOKEN_SECONDARY: ${{ secrets.GITHUB_TOKEN }}
          INPUT_TOKEN_TERTIARY: ${{ github.token }}
        run: |
          pwsh -NoLogo -NoProfile -File tools/priority/Resolve-PolicyToken.ps1 -TokenFileName policy-guard-gh-token.txt

      - name: Verify remote refs are unambiguous
        shell: pwsh
        run: pwsh -NoLogo -NoProfile -File tools/Assert-NoAmbiguousRemoteRefs.ps1

      - name: Run policy guard
        shell: pwsh
        run: |
          pwsh -NoLogo -NoProfile -File tools/priority/Sync-BranchProtectionPolicy.ps1 -FailOnSkip -ResultsDir tests/results/_agent/policy

      - name: Upload policy drift artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: policy-drift-${{ github.run_id }}
          path: tests/results/_agent/policy/policy-drift-report.json
          if-no-files-found: error
