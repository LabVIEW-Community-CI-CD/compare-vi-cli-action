name: Pester run

on:
  workflow_call:
    inputs:
      context_status:
        required: false
        type: string
        default: 'unknown'
      context_artifact_name:
        required: false
        type: string
        default: 'pester-context'
      sample_id:
        required: false
        type: string
      readiness_status:
        required: false
        type: string
        default: 'unknown'
      readiness_artifact_name:
        required: false
        type: string
        default: 'pester-readiness'
      selection_status:
        required: false
        type: string
        default: 'unknown'
      selection_artifact_name:
        required: false
        type: string
        default: 'pester-selection'
      checkout_repository:
        required: false
        type: string
      checkout_ref:
        required: false
        type: string
    outputs:
      dispatcher_exit_code:
        description: 'Dispatcher exit code from the self-hosted execution pass'
        value: ${{ jobs.finalize.outputs.dispatcher_exit_code }}
      raw_artifact_name:
        description: 'Artifact name containing raw execution outputs'
        value: ${{ jobs.finalize.outputs.raw_artifact_name }}
      execution_status:
        description: 'Execution contract outcome for the self-hosted execution pass'
        value: ${{ jobs.finalize.outputs.execution_status }}
      execution_receipt_artifact_name:
        description: 'Artifact name containing the execution contract receipt'
        value: ${{ jobs.finalize.outputs.execution_receipt_artifact_name }}
  workflow_dispatch:
    inputs:
      context_status:
        description: 'Context receipt status'
        required: false
        default: 'unknown'
        type: string
      context_artifact_name:
        description: 'Context receipt artifact name'
        required: false
        default: 'pester-context'
        type: string
      sample_id:
        description: 'Sampling correlation id (prevents cancels)'
        required: false
        default: ''
        type: string
      readiness_status:
        description: 'Readiness receipt status'
        required: false
        default: 'unknown'
        type: string
      readiness_artifact_name:
        description: 'Readiness receipt artifact name'
        required: false
        default: 'pester-readiness'
        type: string
      selection_status:
        description: 'Selection receipt status'
        required: false
        default: 'unknown'
        type: string
      selection_artifact_name:
        description: 'Selection receipt artifact name'
        required: false
        default: 'pester-selection'
        type: string
      checkout_repository:
        description: 'Repository to checkout for execution'
        required: false
        default: ''
        type: string
      checkout_ref:
        description: 'Git ref or SHA to checkout for execution'
        required: false
        default: ''
        type: string

concurrency:
  group: ${{ github.workflow }}-pester-run-${{ github.event.inputs.sample_id || inputs.sample_id || github.ref }}
  cancel-in-progress: true

jobs:
  pester:
    name: Pester (execution only)
    if: ${{ inputs.context_status == 'ready' && inputs.readiness_status == 'ready' && inputs.selection_status == 'ready' }}
    runs-on: [self-hosted, Windows, X64, comparevi, capability-ingress]
    env:
      LV_SUPPRESS_UI: ${{ vars.LV_SUPPRESS_UI || '1' }}
      LV_NO_ACTIVATE: ${{ vars.LV_NO_ACTIVATE || '1' }}
      LV_CURSOR_RESTORE: ${{ vars.LV_CURSOR_RESTORE || '1' }}
      LV_IDLE_WAIT_SECONDS: ${{ vars.LV_IDLE_WAIT_SECONDS || '2' }}
      LV_IDLE_MAX_WAIT_SECONDS: ${{ vars.LV_IDLE_MAX_WAIT_SECONDS || '5' }}
      STUCK_GUARD: ${{ vars.STUCK_GUARD || '1' }}
      CLEAN_LV_BEFORE: ${{ vars.CLEAN_LV_BEFORE || 'true' }}
      CLEAN_LV_AFTER: ${{ vars.CLEAN_LV_AFTER || 'true' }}
      CLEAN_LV_INCLUDE_COMPARE: ${{ vars.CLEAN_LV_INCLUDE_COMPARE || vars.CLEAN_LVCOMPARE || 'true' }}
      LVCOMPARE_PATH: ${{ vars.LVCOMPARE_PATH || '' }}
    outputs:
      dispatcher_exit_code: ${{ steps.execution_receipt.outputs.dispatcher_exit_code }}
      raw_artifact_name: ${{ steps.execution_receipt.outputs.raw_artifact_name }}
      execution_receipt_status: ${{ steps.execution_receipt.outputs.status }}
    steps:
      - uses: actions/checkout@v5
        with:
          repository: ${{ inputs.checkout_repository || github.repository }}
          ref: ${{ inputs.checkout_ref || github.sha }}

      - name: Install Node dependencies
        shell: pwsh
        run: node tools/npm/cli.mjs ci

      - name: Export workflow token for priority sync
        shell: pwsh
        env:
          WORKFLOW_TOKEN: ${{ github.token }}
        run: |
          if (-not $env:WORKFLOW_TOKEN) { throw 'github.token is empty' }
          "GH_TOKEN=$env:WORKFLOW_TOKEN" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "GITHUB_TOKEN=$env:WORKFLOW_TOKEN" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Download context receipt artifact
        uses: actions/download-artifact@v5
        with:
          name: ${{ inputs.context_artifact_name }}
          path: tests/context

      - name: Validate context receipt
        id: context_receipt
        shell: pwsh
        run: |
          $receiptPath = 'tests/context/pester-context.json'
          if (-not (Test-Path -LiteralPath $receiptPath)) {
            throw "Context receipt missing: $receiptPath"
          }
          $receipt = Get-Content -LiteralPath $receiptPath -Raw | ConvertFrom-Json -ErrorAction Stop
          if ($receipt.schema -ne 'pester-context-receipt@v1') {
            throw ("Unexpected context receipt schema: {0}" -f $receipt.schema)
          }
          if ($receipt.status -ne 'ready') {
            throw ("Context receipt status is not ready: {0}" -f $receipt.status)
          }
          "path=$receiptPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "repository=$($receipt.repository)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "standing_priority_issue=$($receipt.standingPriority.issueNumber)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Download readiness receipt artifact
        uses: actions/download-artifact@v5
        with:
          name: ${{ inputs.readiness_artifact_name }}
          path: tests/readiness

      - name: Validate readiness receipt
        id: readiness_receipt
        shell: pwsh
        run: |
          $receiptPath = 'tests/readiness/selfhosted-readiness.json'
          if (-not (Test-Path -LiteralPath $receiptPath)) {
            throw "Readiness receipt missing: $receiptPath"
          }
          $receipt = Get-Content -LiteralPath $receiptPath -Raw | ConvertFrom-Json -ErrorAction Stop
          if ($receipt.schema -ne 'pester-selfhosted-readiness-receipt@v1') {
            throw ("Unexpected readiness receipt schema: {0}" -f $receipt.schema)
          }
          if ($receipt.status -ne 'ready') {
            throw ("Readiness receipt status is not ready: {0}" -f $receipt.status)
          }
          $freshnessWindowSeconds = 900
          if ($receipt.PSObject.Properties.Name -contains 'freshnessWindowSeconds') {
            $freshnessWindowSeconds = [int]$receipt.freshnessWindowSeconds
          }
          $generatedAtUtc = [DateTime]::Parse($receipt.generatedAtUtc).ToUniversalTime()
          $ageSeconds = [math]::Floor(([DateTime]::UtcNow - $generatedAtUtc).TotalSeconds)
          if ($ageSeconds -gt $freshnessWindowSeconds) {
            throw ("Readiness receipt stale: age {0}s exceeds freshness window {1}s" -f $ageSeconds, $freshnessWindowSeconds)
          }
          "path=$receiptPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "generated_at_utc=$($generatedAtUtc.ToString('o'))" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "freshness_window_seconds=$freshnessWindowSeconds" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Download selection receipt artifact
        uses: actions/download-artifact@v5
        with:
          name: ${{ inputs.selection_artifact_name }}
          path: tests/selection

      - name: Validate selection receipt
        id: selection_receipt
        shell: pwsh
        run: |
          $receiptPath = 'tests/selection/pester-selection.json'
          if (-not (Test-Path -LiteralPath $receiptPath)) {
            throw "Selection receipt missing: $receiptPath"
          }
          $receipt = Get-Content -LiteralPath $receiptPath -Raw | ConvertFrom-Json -ErrorAction Stop
          if ($receipt.schema -ne 'pester-selection-receipt@v1') {
            throw ("Unexpected selection receipt schema: {0}" -f $receipt.schema)
          }
          if ($receipt.status -ne 'ready') {
            throw ("Selection receipt status is not ready: {0}" -f $receipt.status)
          }
          $patternsJson = @($receipt.selection.includePatterns) | ConvertTo-Json -Compress
          if (-not $patternsJson) { $patternsJson = '[]' }
          "path=$receiptPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "integration_mode=$($receipt.selection.integrationMode)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "fixture_required=$(([string]$receipt.selection.fixtureRequired).ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "include_patterns_json=$patternsJson" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "timeout_seconds=$($receipt.dispatcherProfile.timeoutSeconds)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "emit_failures_json_always=$($receipt.dispatcherProfile.emitFailuresJsonAlways)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "detect_leaks=$($receipt.dispatcherProfile.detectLeaks)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "fail_on_leaks=$($receipt.dispatcherProfile.failOnLeaks)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "kill_leaks=$($receipt.dispatcherProfile.killLeaks)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "leak_grace_seconds=$($receipt.dispatcherProfile.leakGraceSeconds)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "clean_labview_before=$($receipt.dispatcherProfile.cleanLabVIEWBefore)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "clean_after=$($receipt.dispatcherProfile.cleanAfter)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "track_artifacts=$($receipt.dispatcherProfile.trackArtifacts)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Acquire session lock
        shell: pwsh
        run: pwsh -NoLogo -NoProfile -File tools/Session-Lock.ps1 -Action Acquire -Group 'pester-selfhosted' -QueueWaitSeconds 15 -QueueMaxAttempts 40 -StaleSeconds 300 -HeartbeatSeconds 15

      - name: LV Guard (pre)
        uses: ./.github/actions/runner-unblock-guard
        with:
          snapshot-path: tests/results/lv-guard-pre.json
          cleanup: ${{ env.CLEAN_LV_BEFORE == 'true' }}
          process-names: 'LVCompare,LabVIEW'

      - name: Prepare fixture copies (base/head)
        if: ${{ steps.selection_receipt.outputs.fixture_required == 'true' }}
        id: fixtures
        uses: ./.github/actions/prepare-fixtures

      - name: Export fixture env for tests
        if: ${{ steps.selection_receipt.outputs.fixture_required == 'true' }}
        shell: pwsh
        run: |
          if ('${{ steps.fixtures.outputs.base }}' -and '${{ steps.fixtures.outputs.head }}') {
            "LV_BASE_VI=${{ steps.fixtures.outputs.base }}" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            "LV_HEAD_VI=${{ steps.fixtures.outputs.head }}" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          } else {
            Write-Host '::warning::prepare-fixtures did not emit expected outputs; proceeding without LV_* env.'
          }

      - name: Apply dispatcher profile
        id: dprofile
        uses: ./.github/actions/dispatcher-profile
        with:
          timeout-seconds: ${{ steps.selection_receipt.outputs.timeout_seconds }}
          emit-failures-json-always: ${{ steps.selection_receipt.outputs.emit_failures_json_always }}
          detect-leaks: ${{ steps.selection_receipt.outputs.detect_leaks }}
          fail-on-leaks: ${{ steps.selection_receipt.outputs.fail_on_leaks }}
          kill-leaks: ${{ steps.selection_receipt.outputs.kill_leaks }}
          leak-grace-seconds: ${{ steps.selection_receipt.outputs.leak_grace_seconds }}
          clean-labview-before: ${{ steps.selection_receipt.outputs.clean_labview_before }}
          clean-after: ${{ steps.selection_receipt.outputs.clean_after }}
          track-artifacts: ${{ steps.selection_receipt.outputs.track_artifacts }}

      - name: Wire Probe (T1)
        if: ${{ vars.WIRE_PROBES != '0' }}
        uses: ./.github/actions/wire-probe
        with:
          phase: T1
          results-dir: tests/results

      - name: Run Pester tests via local dispatcher
        id: dispatcher
        continue-on-error: true
        shell: pwsh
        run: |
          $logPath = 'tests/results/pester-dispatcher.log'
          $logDir = Split-Path -Parent $logPath
          if (-not (Test-Path $logDir)) { New-Item -ItemType Directory -Force -Path $logDir | Out-Null }
          if (Test-Path -LiteralPath $logPath) { Remove-Item -LiteralPath $logPath -Force }
          $dispatcherPath = Join-Path (Get-Location) 'Invoke-PesterTests.ps1'
          if (-not (Test-Path -LiteralPath $dispatcherPath -PathType Leaf)) {
            throw "Dispatcher script not found at $dispatcherPath"
          }
          $bound = [ordered]@{}
          $bound.TestsPath = 'tests'
          $integrationMode = '${{ steps.selection_receipt.outputs.integration_mode }}'
          if ($integrationMode) {
            $bound.IntegrationMode = $integrationMode
          }
          $bound.ResultsPath = 'tests/results'
          if ($env:DISPATCHER_LIVE_OUTPUT -ne '0') { $bound.LiveOutput = $true }
          if ('${{ steps.dprofile.outputs.emit_failures_json_always }}' -eq 'true') { $bound.EmitFailuresJsonAlways = $true }
          $patterns = '${{ steps.selection_receipt.outputs.include_patterns_json }}' | ConvertFrom-Json -ErrorAction Stop
          if ($patterns -and @($patterns).Count -gt 0) {
            $bound.IncludePatterns = @($patterns)
          }
          $timeoutSeconds = '${{ steps.dprofile.outputs.timeout_seconds }}'
          if ($timeoutSeconds -and $timeoutSeconds -match '^-?\d+(\.\d+)?$') {
            $bound.TimeoutSeconds = [double]$timeoutSeconds
          }
          $lockScript = Join-Path (Get-Location) 'tools/Session-Lock.ps1'
          $heartbeatSeconds = 15
          $heartbeatJob = Start-ThreadJob -ScriptBlock {
            param($scriptPath,$seconds)
            while ($true) {
              pwsh -NoLogo -NoProfile -File $scriptPath -Action Heartbeat | Out-Null
              Start-Sleep -Seconds $seconds
            }
          } -ArgumentList $lockScript, $heartbeatSeconds
          $exitCode = 0
          try {
            & $dispatcherPath @bound 2>&1 | Tee-Object -FilePath $logPath
            $exitCode = $LASTEXITCODE
          } finally {
            if ($heartbeatJob) {
              Stop-Job -Id $heartbeatJob.Id | Out-Null
              Remove-Job -Id $heartbeatJob.Id -Force | Out-Null
            }
            pwsh -NoLogo -NoProfile -File $lockScript -Action Heartbeat | Out-Null
          }
          if (-not $env:GITHUB_OUTPUT) {
            $fallbackOutput = Join-Path (Get-Location) 'tests/results/dispatcher-github-output.txt'
            $fallbackDir = Split-Path -Parent $fallbackOutput
            if (-not (Test-Path -LiteralPath $fallbackDir)) {
              New-Item -ItemType Directory -Path $fallbackDir -Force | Out-Null
            }
            $env:GITHUB_OUTPUT = [System.IO.Path]::GetFullPath($fallbackOutput)
          }
          "exit_code=$exitCode" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          $global:LASTEXITCODE = 0

      - name: Release session lock
        if: always()
        shell: pwsh
        run: pwsh -NoLogo -NoProfile -File tools/Session-Lock.ps1 -Action Release

      - name: Write execution receipt
        id: execution_receipt
        if: always()
        shell: pwsh
        run: |
          $resultsDir = 'tests/results'
          if (-not (Test-Path -LiteralPath $resultsDir)) {
            New-Item -ItemType Directory -Path $resultsDir -Force | Out-Null
          }
          $summaryPath = Join-Path $resultsDir 'pester-summary.json'
          $dispatcherExitCode = '${{ steps.dispatcher.outputs.exit_code }}'
          $status = 'seam-defect'
          if ($dispatcherExitCode -eq '') {
            $dispatcherExitCode = '-1'
          }
          $contextReceiptPresent = Test-Path -LiteralPath '${{ steps.context_receipt.outputs.path }}'
          $readinessReceiptPresent = Test-Path -LiteralPath '${{ steps.readiness_receipt.outputs.path }}'
          $selectionReceiptPresent = Test-Path -LiteralPath '${{ steps.selection_receipt.outputs.path }}'
          if ((Test-Path -LiteralPath $summaryPath) -and $dispatcherExitCode -eq '0') {
            $status = 'completed'
          } elseif (Test-Path -LiteralPath $summaryPath) {
            $status = 'test-failures'
          }
          $receipt = [ordered]@{
            schema             = 'pester-execution-receipt@v1'
            generatedAtUtc     = [DateTime]::UtcNow.ToString('o')
            contextStatus      = '${{ inputs.context_status }}'
            contextReceiptPath = '${{ steps.context_receipt.outputs.path }}'
            contextReceiptPresent = $contextReceiptPresent
            repository         = '${{ steps.context_receipt.outputs.repository }}'
            standingPriorityIssue = '${{ steps.context_receipt.outputs.standing_priority_issue }}'
            readinessStatus    = '${{ inputs.readiness_status }}'
            readinessReceiptPath = '${{ steps.readiness_receipt.outputs.path }}'
            readinessReceiptPresent = $readinessReceiptPresent
            readinessReceiptGeneratedAtUtc = '${{ steps.readiness_receipt.outputs.generated_at_utc }}'
            readinessReceiptFreshnessWindowSeconds = '${{ steps.readiness_receipt.outputs.freshness_window_seconds }}'
            selectionStatus    = '${{ inputs.selection_status }}'
            selectionReceiptPath = '${{ steps.selection_receipt.outputs.path }}'
            selectionReceiptPresent = $selectionReceiptPresent
            selectionIntegrationMode = '${{ steps.selection_receipt.outputs.integration_mode }}'
            selectionFixtureRequired = '${{ steps.selection_receipt.outputs.fixture_required }}'
            dispatcherExitCode = [int]$dispatcherExitCode
            summaryPresent     = Test-Path -LiteralPath $summaryPath
            status             = $status
            rawArtifactName    = 'pester-run-raw'
          }
          $receiptPath = Join-Path $resultsDir 'pester-run-receipt.json'
          $receipt | ConvertTo-Json -Depth 6 | Set-Content -LiteralPath $receiptPath -Encoding UTF8
          "status=$status" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "dispatcher_exit_code=$dispatcherExitCode" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "raw_artifact_name=pester-run-raw" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload raw Pester execution artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pester-run-raw
          path: tests/results
          if-no-files-found: warn

  finalize:
    runs-on: ubuntu-latest
    needs: [pester]
    if: always()
    outputs:
      dispatcher_exit_code: ${{ steps.emit.outputs.dispatcher_exit_code }}
      raw_artifact_name: ${{ steps.emit.outputs.raw_artifact_name }}
      execution_status: ${{ steps.emit.outputs.execution_status }}
      execution_receipt_artifact_name: ${{ steps.emit.outputs.execution_receipt_artifact_name }}
    steps:
      - name: Emit execution contract
        id: emit
        shell: pwsh
        run: |
          $resultsDir = Join-Path 'tests/results' 'pester-execution-contract'
          New-Item -ItemType Directory -Path $resultsDir -Force | Out-Null
          $executionStatus = 'unknown'
          $receiptStatus = '${{ needs.pester.outputs.execution_receipt_status }}'
          $rawArtifactName = ''
          if ('${{ inputs.context_status }}' -ne 'ready') {
            $executionStatus = 'skipped'
            $receiptStatus = 'context-blocked'
          } elseif ('${{ inputs.readiness_status }}' -ne 'ready') {
            $executionStatus = 'skipped'
            if ([string]::IsNullOrWhiteSpace($receiptStatus)) { $receiptStatus = 'readiness-blocked' }
          } elseif ('${{ inputs.selection_status }}' -ne 'ready') {
            $executionStatus = 'skipped'
            if ([string]::IsNullOrWhiteSpace($receiptStatus)) { $receiptStatus = 'selection-blocked' }
          } else {
            switch ('${{ needs.pester.result }}') {
              'success' {
                $executionStatus = 'completed'
                $rawArtifactName = 'pester-run-raw'
                if ([string]::IsNullOrWhiteSpace($receiptStatus)) { $receiptStatus = 'completed' }
              }
              'failure' {
                $executionStatus = 'seam-defect'
                $rawArtifactName = 'pester-run-raw'
                if ([string]::IsNullOrWhiteSpace($receiptStatus)) { $receiptStatus = 'seam-defect' }
              }
              'cancelled' {
                $executionStatus = 'cancelled'
                if ([string]::IsNullOrWhiteSpace($receiptStatus)) { $receiptStatus = 'cancelled' }
              }
              'skipped' {
                $executionStatus = 'skipped'
                if ([string]::IsNullOrWhiteSpace($receiptStatus)) { $receiptStatus = 'skipped' }
              }
              default {
                $executionStatus = 'unknown'
                if ([string]::IsNullOrWhiteSpace($receiptStatus)) { $receiptStatus = 'unknown' }
              }
            }
          }
          $dispatcherExitCode = '${{ needs.pester.outputs.dispatcher_exit_code }}'
          if ([string]::IsNullOrWhiteSpace($dispatcherExitCode)) {
            if ($receiptStatus -eq 'completed') {
              $dispatcherExitCode = '0'
            } else {
              $dispatcherExitCode = '-1'
            }
          }
          $receipt = [ordered]@{
            schema             = 'pester-execution-receipt@v1'
            generatedAtUtc     = [DateTime]::UtcNow.ToString('o')
            contextStatus      = '${{ inputs.context_status }}'
            readinessStatus    = '${{ inputs.readiness_status }}'
            selectionStatus    = '${{ inputs.selection_status }}'
            executionJobResult = '${{ needs.pester.result }}'
            dispatcherExitCode = [int]$dispatcherExitCode
            status             = $receiptStatus
            rawArtifactName    = $rawArtifactName
            rawArtifactExpected = -not [string]::IsNullOrWhiteSpace($rawArtifactName)
            source             = 'pester-run/finalize'
          }
          $receiptPath = Join-Path $resultsDir 'pester-run-receipt.json'
          $receipt | ConvertTo-Json -Depth 6 | Set-Content -LiteralPath $receiptPath -Encoding UTF8
          "execution_status=$executionStatus" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "dispatcher_exit_code=$dispatcherExitCode" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "raw_artifact_name=$rawArtifactName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "execution_receipt_artifact_name=pester-execution-contract" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload execution contract artifact
        uses: actions/upload-artifact@v7
        with:
          name: pester-execution-contract
          path: tests/results/pester-execution-contract
          if-no-files-found: error
