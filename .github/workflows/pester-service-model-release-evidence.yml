name: Pester service-model release evidence

on:
  workflow_dispatch:
  pull_request:
    branches:
      - develop
    paths:
      - '.github/workflows/pester-service-model-release-evidence.yml'
      - '.github/workflows/pester-service-model-quality.yml'
      - '.github/workflows/pester-context.yml'
      - '.github/workflows/pester-gate.yml'
      - '.github/workflows/pester-run.yml'
      - '.github/workflows/pester-evidence.yml'
      - '.github/workflows/pester-service-model-on-label.yml'
      - '.github/workflows/selfhosted-readiness.yml'
      - 'docs/knowledgebase/Pester-Service-Model.md'
      - 'docs/architecture/pester-service-model-control-plane.md'
      - 'docs/architecture/ADR-2078-pester-service-model-requirements.md'
      - 'docs/cm-plan-pester-service-model.md'
      - 'docs/pester-service-model-promotion-comparison.json'
      - 'docs/release-procedure-pester-service-model.md'
      - 'docs/requirements-pester-service-model-srs.md'
      - 'docs/rtm-pester-service-model.csv'
      - 'docs/schemas/pester-derived-provenance-v1.schema.json'
      - 'docs/schemas/pester-promotion-comparison-v1.schema.json'
      - 'docs/testing/pester-service-model-test-plan.md'
      - 'docs/pester-service-model-quality-report.md'
      - 'docs/pester-service-model-information-item-map.md'
      - 'tools/priority/materialize-pester-service-model-release-evidence.mjs'
      - 'tools/priority/pester-service-model-provenance.mjs'
      - 'tools/priority/render-pester-service-model-promotion-dossier.mjs'
      - 'tools/priority/write-node-test-coverage-xml.mjs'
      - 'tools/priority/__tests__/pester-service-model-workflow-contract.test.mjs'
      - 'tools/priority/__tests__/pester-service-model-quality-workflow-contract.test.mjs'
      - 'tools/priority/__tests__/pester-service-model-release-evidence-provenance.test.mjs'
      - 'tools/priority/__tests__/pester-service-model-release-evidence-workflow-contract.test.mjs'
      - 'tools/priority/__tests__/write-node-test-coverage-xml.test.mjs'
  push:
    branches:
      - integration/**
      - codex/pester-service-model-*
      - codex/integration-routing-observability
    paths:
      - '.github/workflows/pester-service-model-release-evidence.yml'
      - '.github/workflows/pester-service-model-quality.yml'
      - '.github/workflows/pester-context.yml'
      - '.github/workflows/pester-gate.yml'
      - '.github/workflows/pester-run.yml'
      - '.github/workflows/pester-evidence.yml'
      - '.github/workflows/pester-service-model-on-label.yml'
      - '.github/workflows/selfhosted-readiness.yml'
      - 'docs/knowledgebase/Pester-Service-Model.md'
      - 'docs/architecture/pester-service-model-control-plane.md'
      - 'docs/architecture/ADR-2078-pester-service-model-requirements.md'
      - 'docs/cm-plan-pester-service-model.md'
      - 'docs/pester-service-model-promotion-comparison.json'
      - 'docs/release-procedure-pester-service-model.md'
      - 'docs/requirements-pester-service-model-srs.md'
      - 'docs/rtm-pester-service-model.csv'
      - 'docs/schemas/pester-derived-provenance-v1.schema.json'
      - 'docs/schemas/pester-promotion-comparison-v1.schema.json'
      - 'docs/testing/pester-service-model-test-plan.md'
      - 'docs/pester-service-model-quality-report.md'
      - 'docs/pester-service-model-information-item-map.md'
      - 'tools/priority/materialize-pester-service-model-release-evidence.mjs'
      - 'tools/priority/pester-service-model-provenance.mjs'
      - 'tools/priority/render-pester-service-model-promotion-dossier.mjs'
      - 'tools/priority/write-node-test-coverage-xml.mjs'
      - 'tools/priority/__tests__/pester-service-model-workflow-contract.test.mjs'
      - 'tools/priority/__tests__/pester-service-model-quality-workflow-contract.test.mjs'
      - 'tools/priority/__tests__/pester-service-model-release-evidence-provenance.test.mjs'
      - 'tools/priority/__tests__/pester-service-model-release-evidence-workflow-contract.test.mjs'
      - 'tools/priority/__tests__/write-node-test-coverage-xml.test.mjs'

permissions:
  contents: read

env:
  PSM_UPSTREAM_ISSUE: '2069'
  PSM_FORK_ISSUE: '2078'
  PSM_FORK_BASIS_COMMIT: 'e188d43768a16286f79b20046e508a7c6e53e2b2'
  PSM_FORK_BASIS_URL: 'https://github.com/LabVIEW-Community-CI-CD/compare-vi-cli-action/issues/2078#issuecomment-4164132415'

jobs:
  release-evidence:
    name: Release evidence / pester-service-model
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Install Node dependencies
        shell: bash
        run: node tools/npm/cli.mjs ci

      - name: Run packet tests with Node coverage
        shell: bash
        run: |
          mkdir -p tests/results/_agent/pester-service-model
          node --test --experimental-test-coverage \
            tools/priority/__tests__/pester-service-model-workflow-contract.test.mjs \
            tools/priority/__tests__/pester-service-model-quality-workflow-contract.test.mjs \
            tools/priority/__tests__/pester-service-model-release-evidence-provenance.test.mjs \
            tools/priority/__tests__/write-node-test-coverage-xml.test.mjs \
            2>&1 | tee tests/results/_agent/pester-service-model/node-test-coverage.log

      - name: Materialize coverage.xml
        shell: bash
        run: |
          node tools/priority/write-node-test-coverage-xml.mjs \
            --input tests/results/_agent/pester-service-model/node-test-coverage.log \
            --output tests/results/_agent/pester-service-model/coverage.xml \
            --line-threshold 75

      - name: Docs link check / lychee
        uses: lycheeverse/lychee-action@v2
        with:
          fail: true
          failIfEmpty: false
          format: json
          output: tests/results/_agent/pester-service-model/docs-link-check.json
          args: >-
            --no-progress
            docs/knowledgebase/Pester-Service-Model.md
            docs/architecture/pester-service-model-control-plane.md
            docs/architecture/ADR-2078-pester-service-model-requirements.md
            docs/cm-plan-pester-service-model.md
            docs/release-procedure-pester-service-model.md
            docs/requirements-pester-service-model-srs.md
            docs/pester-service-model-quality-report.md
            docs/pester-service-model-information-item-map.md

      - name: Materialize release evidence bundle
        shell: bash
        run: |
          node tools/priority/materialize-pester-service-model-release-evidence.mjs \
            --output-dir tests/results/_agent/pester-service-model/release-evidence \
            --version v0.1.0 \
            --upstream-issue "$PSM_UPSTREAM_ISSUE" \
            --fork-issue "$PSM_FORK_ISSUE" \
            --fork-basis-commit "$PSM_FORK_BASIS_COMMIT" \
            --fork-basis-url "$PSM_FORK_BASIS_URL"
          node tools/priority/render-pester-service-model-promotion-dossier.mjs \
            --release-evidence-dir tests/results/_agent/pester-service-model/release-evidence \
            --output tests/results/_agent/pester-service-model/release-evidence/promotion-dossier.md \
            --upstream-issue "$PSM_UPSTREAM_ISSUE" \
            --fork-issue "$PSM_FORK_ISSUE" \
            --fork-basis-commit "$PSM_FORK_BASIS_COMMIT" \
            --fork-basis-url "$PSM_FORK_BASIS_URL"
          test -f tests/results/_agent/pester-service-model/release-evidence/release-evidence-provenance.json
          test -f tests/results/_agent/pester-service-model/release-evidence/promotion-dossier-provenance.json

      - name: Upload release-evidence bundle
        uses: actions/upload-artifact@v7
        with:
          name: pester-service-model-release-evidence
          path: tests/results/_agent/pester-service-model/release-evidence
          if-no-files-found: error
