name: Fixture Drift Validation

on:
  pull_request:
    paths:
    - 'fixtures.manifest.json'
    - 'VI*.vi'
    - 'scripts/**'
    - 'tools/**'
    - 'docs/schemas/**'
  workflow_dispatch:
    inputs:
      sample_id:
        description: 'Sampling correlation id (prevents cancels)'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.inputs.sample_id || github.ref }}
  cancel-in-progress: true

jobs:
  validate-ubuntu:
    name: Fixture Drift (Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      CLEAN_LV_BEFORE: ${{ vars.CLEAN_LV_BEFORE || 'true' }}
      CLEAN_LV_AFTER: ${{ vars.CLEAN_LV_AFTER || 'true' }}
      CLEAN_LV_INCLUDE_COMPARE: ${{ vars.CLEAN_LV_INCLUDE_COMPARE || vars.CLEAN_LVCOMPARE || 'true' }}
    permissions:
      actions: read
      contents: read
      pull-requests: write
    steps:
    - name: Checkout
      uses: actions/checkout@v5
      with:
        repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
        ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        fetch-depth: 0
    - name: LV Guard (pre)
      uses: ./.github/actions/runner-unblock-guard
      with:
        snapshot-path: results/fixture-drift/lv-guard-pre.json
        cleanup: ${{ env.CLEAN_LV_BEFORE == 'true' }}
        process-names: 'LVCompare,LabVIEW'

    - name: LabVIEW warmup (best-effort)
      shell: pwsh
      run: pwsh -File tools/Warmup-LabVIEW.ps1

    - name: Ensure Invoker (start)
      uses: ./.github/actions/ensure-invoker
      with:
        mode: start
        results-dir: results/fixture-drift

    - name: Detect docs-only change
      id: docs
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Continue'
        $docsOnly = 'false'
        if ('${{ github.event_name }}' -eq 'pull_request') {
          $ownerRepo = '${{ github.repository }}'
          $pr = '${{ github.event.pull_request.number }}'
          $uri = "https://api.github.com/repos/$ownerRepo/pulls/$pr/files"
          $headers = @{ Authorization = "Bearer $env:GITHUB_TOKEN"; 'X-GitHub-Api-Version' = '2022-11-28'; Accept='application/vnd.github+json' }
          try {
            $files = Invoke-RestMethod -Method Get -Uri $uri -Headers $headers -ErrorAction Stop
            $names = @($files | ForEach-Object { $_.filename })
            if ($names.Count -gt 0) {
              $isDocs = $true
              foreach ($n in $names) {
                $inDocs = ($n -like 'docs/**' -or $n -like '**/*.md')
                $isSchema = ($n -like 'docs/schemas/**')
                if (-not $inDocs -or $isSchema) { $isDocs = $false; break }
              }
              if ($isDocs) { $docsOnly = 'true' }
            }
          } catch {
            Write-Host '::notice::Docs-only detection skipped (unable to query PR files). Treating as non-docs.'
          }
        }
        "docs_only=$docsOnly" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

    - name: Fixture Drift Orchestrator
      uses: ./.github/actions/fixture-drift
      with:
        render-report: 'false'
        comment-on-fail: 'true'
        upload-artifacts: 'true'
        artifact-name: fixture-drift-ubuntu
        soft-fail: ${{ steps.docs.outputs.docs_only }}

  ni-linux-container-hosted:
    name: NI Linux Container Compare (Hosted)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NI_LINUX_IMAGE: nationalinstruments/labview:2026q1-linux
      NI_LINUX_LABVIEW_PATH: /usr/local/natinst/LabVIEW-2026-64/labview
    permissions:
      actions: read
      contents: read
    steps:
    - name: Checkout
      uses: actions/checkout@v5
      with:
        repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
        ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        fetch-depth: 0
    - name: Hydrate pull request base commit for VI history
      if: github.event_name == 'pull_request'
      shell: bash
      run: |
        set -euo pipefail
        git remote add upstream-base "https://github.com/${{ github.event.pull_request.base.repo.full_name }}"
        git fetch --no-tags upstream-base "+refs/heads/${{ github.event.pull_request.base.ref }}:refs/remotes/upstream-base/${{ github.event.pull_request.base.ref }}"
        git rev-parse --verify --quiet "${{ github.event.pull_request.base.sha }}^{commit}"
    - name: Prepare fixture copies (base/head)
      id: prep
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        $tmp = Join-Path $env:RUNNER_TEMP ("fixtures-linux-" + [guid]::NewGuid().ToString())
        New-Item -ItemType Directory -Force -Path $tmp | Out-Null
        $base = Join-Path $tmp 'base.vi'
        $head = Join-Path $tmp 'head.vi'
        Copy-Item -LiteralPath (Join-Path $env:GITHUB_WORKSPACE 'VI1.vi') -Destination $base -Force
        Copy-Item -LiteralPath (Join-Path $env:GITHUB_WORKSPACE 'VI2.vi') -Destination $head -Force
        "base=$base`nhead=$head" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

    - name: Pull NI Linux image
      shell: bash
      run: docker pull "${NI_LINUX_IMAGE}"

    - name: NI Linux review suite artifacts
      id: ni_linux_review_suite
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        $outDir = 'results/fixture-drift/ni-linux-container'
        $historyMaxCommitCount = 64
        $historyBranchRef = '${{ github.sha }}'
        $historyBaselineRef = ''
        if ('${{ github.event_name }}' -eq 'pull_request') {
          $historyBranchRef = '${{ github.event.pull_request.head.sha }}'
          $historyBaselineRef = '${{ github.event.pull_request.base.sha }}'
          if ('${{ github.event.pull_request.base.ref }}' -eq 'main' -and '${{ github.head_ref }}'.StartsWith('release/')) {
            $historyBaselineRef = ('{0}~{1}' -f $historyBranchRef, $historyMaxCommitCount)
            Write-Host ("[fixture-drift] using rolling VI history baseline for release PR: {0}" -f $historyBaselineRef)
          }
        }
        New-Item -ItemType Directory -Path $outDir -Force | Out-Null

        pwsh -NoLogo -NoProfile -File tools/Invoke-NILinuxReviewSuite.ps1 `
          -BaseVi '${{ steps.prep.outputs.base }}' `
          -HeadVi '${{ steps.prep.outputs.head }}' `
          -ResultsRoot $outDir `
          -Image $env:NI_LINUX_IMAGE `
          -LabVIEWPath $env:NI_LINUX_LABVIEW_PATH `
          -HistoryTargetPath 'fixtures/vi-attr/Head.vi' `
          -HistoryBranchRef $historyBranchRef `
          -HistoryBaselineRef $historyBaselineRef `
          -HistoryMaxCommitCount $historyMaxCommitCount `
          -TimeoutSeconds 240 `
          -HeartbeatSeconds 15 `
          -RuntimeEngineReadyTimeoutSeconds 120 `
          -RuntimeEngineReadyPollSeconds 3 `
          -GitHubOutputPath $env:GITHUB_OUTPUT `
          -GitHubStepSummaryPath $env:GITHUB_STEP_SUMMARY

    - name: Upload NI Linux container compare artifacts
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: fixture-drift-ni-linux-container
        path: results/fixture-drift/ni-linux-container/**
        if-no-files-found: warn
