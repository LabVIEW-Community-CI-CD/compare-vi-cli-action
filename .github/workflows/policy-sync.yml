name: Policy Sync (Admin)

on:
  workflow_dispatch:
    inputs:
      apply:
        description: 'Apply policy.json settings to GitHub branch protections/rulesets'
        required: false
        default: false
        type: boolean

jobs:
  policy-sync:
    name: policy-sync
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Prepare policy sync token
        shell: pwsh
        env:
          INPUT_TOKEN_PRIMARY: ${{ secrets.GH_TOKEN }}
          INPUT_TOKEN_SECONDARY: ${{ secrets.GITHUB_TOKEN }}
          INPUT_TOKEN_TERTIARY: ${{ github.token }}
        run: |
          pwsh -NoLogo -NoProfile -File tools/priority/Resolve-PolicyToken.ps1 -TokenFileName policy-sync-gh-token.txt

      - name: Run policy sync/check
        shell: pwsh
        run: |
          if ('${{ inputs.apply }}' -eq 'true') {
            pwsh -NoLogo -NoProfile -File tools/priority/Sync-BranchProtectionPolicy.ps1 -Apply -FailOnSkip -ResultsDir tests/results/_agent/policy
          } else {
            pwsh -NoLogo -NoProfile -File tools/priority/Sync-BranchProtectionPolicy.ps1 -FailOnSkip -ResultsDir tests/results/_agent/policy
          }

      - name: Upload policy sync artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: policy-sync-${{ github.run_id }}
          path: tests/results/_agent/policy/policy-drift-report.json
          if-no-files-found: error
