name: Pester service-model quality

on:
  workflow_dispatch:
  pull_request:
    branches:
      - develop
    paths:
      - '.github/workflows/pester-service-model-quality.yml'
      - '.github/workflows/pester-service-model-release-evidence.yml'
      - '.github/workflows/pester-context.yml'
      - '.github/workflows/pester-gate.yml'
      - '.github/workflows/pester-run.yml'
      - '.github/workflows/pester-evidence.yml'
      - '.github/workflows/pester-service-model-on-label.yml'
      - '.github/workflows/selfhosted-readiness.yml'
      - 'docs/knowledgebase/Pester-Service-Model.md'
      - 'docs/architecture/pester-service-model-control-plane.md'
      - 'docs/architecture/ADR-2078-pester-service-model-requirements.md'
      - 'docs/cm-plan-pester-service-model.md'
      - 'docs/release-procedure-pester-service-model.md'
      - 'docs/requirements-pester-service-model-srs.md'
      - 'docs/rtm-pester-service-model.csv'
      - 'docs/testing/pester-service-model-test-plan.md'
      - 'docs/pester-service-model-quality-report.md'
      - 'docs/pester-service-model-information-item-map.md'
      - 'tools/priority/write-node-test-coverage-xml.mjs'
      - 'tools/priority/__tests__/pester-service-model-workflow-contract.test.mjs'
      - 'tools/priority/__tests__/pester-service-model-quality-workflow-contract.test.mjs'
      - 'tools/priority/__tests__/write-node-test-coverage-xml.test.mjs'
  push:
    branches:
      - integration/**
      - codex/pester-service-model-*
      - codex/integration-routing-observability
    paths:
      - '.github/workflows/pester-service-model-quality.yml'
      - '.github/workflows/pester-context.yml'
      - '.github/workflows/pester-gate.yml'
      - '.github/workflows/pester-run.yml'
      - '.github/workflows/pester-evidence.yml'
      - '.github/workflows/pester-service-model-on-label.yml'
      - '.github/workflows/selfhosted-readiness.yml'
      - 'docs/knowledgebase/Pester-Service-Model.md'
      - 'docs/architecture/pester-service-model-control-plane.md'
      - 'docs/architecture/ADR-2078-pester-service-model-requirements.md'
      - 'docs/cm-plan-pester-service-model.md'
      - 'docs/release-procedure-pester-service-model.md'
      - 'docs/requirements-pester-service-model-srs.md'
      - 'docs/rtm-pester-service-model.csv'
      - 'docs/testing/pester-service-model-test-plan.md'
      - 'docs/pester-service-model-quality-report.md'
      - 'docs/pester-service-model-information-item-map.md'
      - 'tools/priority/write-node-test-coverage-xml.mjs'
      - 'tools/priority/__tests__/pester-service-model-workflow-contract.test.mjs'
      - 'tools/priority/__tests__/pester-service-model-quality-workflow-contract.test.mjs'
      - 'tools/priority/__tests__/write-node-test-coverage-xml.test.mjs'

permissions:
  contents: read

jobs:
  coverage:
    name: PR Coverage Gate / coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Node dependencies
        shell: bash
        run: node tools/npm/cli.mjs ci

      - name: Run packet tests with Node coverage
        shell: bash
        run: |
          mkdir -p tests/results/_agent/pester-service-model
          node --test --experimental-test-coverage \
            tools/priority/__tests__/pester-service-model-workflow-contract.test.mjs \
            tools/priority/__tests__/pester-service-model-quality-workflow-contract.test.mjs \
            tools/priority/__tests__/write-node-test-coverage-xml.test.mjs \
            2>&1 | tee tests/results/_agent/pester-service-model/node-test-coverage.log

      - name: Materialize coverage.xml
        shell: bash
        run: |
          node tools/priority/write-node-test-coverage-xml.mjs \
            --input tests/results/_agent/pester-service-model/node-test-coverage.log \
            --output tests/results/_agent/pester-service-model/coverage.xml \
            --line-threshold 75

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: pester-service-model-coverage
          path: tests/results/_agent/pester-service-model/coverage.xml
          if-no-files-found: error

  docs:
    name: Docs link check / lychee
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run Lychee on packet docs
        uses: lycheeverse/lychee-action@v2
        with:
          fail: true
          args: >-
            --no-progress
            docs/knowledgebase/Pester-Service-Model.md
            docs/architecture/pester-service-model-control-plane.md
            docs/architecture/ADR-2078-pester-service-model-requirements.md
            docs/cm-plan-pester-service-model.md
            docs/release-procedure-pester-service-model.md
            docs/requirements-pester-service-model-srs.md
            docs/pester-service-model-quality-report.md
            docs/pester-service-model-information-item-map.md
