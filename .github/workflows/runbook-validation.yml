name: Integration Runbook Validation

on:
  workflow_dispatch:
    inputs:
      sample_id:
        description: 'Sampling correlation id (prevents cancels)'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.inputs.sample_id || github.ref }}
  cancel-in-progress: true

jobs:
  runbook-check:
    if: ${{ github.event.repository.fork != true && !startsWith(github.ref, 'refs/tags/') }}
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run Runbook Core Phases
        id: host_runbook
        shell: pwsh
        run: |
          $startedAt = (Get-Date)
          pwsh -File scripts/Invoke-IntegrationRunbook.ps1 -Phases Prereqs,CanonicalCli,ViInputs -JsonReport runbook-ci.json -PassThru | Out-Null
          $elapsedSeconds = [math]::Round((New-TimeSpan -Start $startedAt -End (Get-Date)).TotalSeconds, 2)
          $json = Get-Content runbook-ci.json -Raw | ConvertFrom-Json
          $json | Add-Member -NotePropertyName hostElapsedSeconds -NotePropertyValue $elapsedSeconds -Force
          $json | ConvertTo-Json -Depth 20 | Set-Content -LiteralPath runbook-ci.json -Encoding utf8
          $loopPhase = @($json.phases) | Where-Object { $_.name -eq 'Loop' } | Select-Object -First 1
          $executionTopology = if ($loopPhase -and $loopPhase.details -and $loopPhase.details.PSObject.Properties.Name -contains 'executionTopology') { $loopPhase.details.executionTopology } else { $null }
          if ($env:GITHUB_OUTPUT) {
            Add-Content -Path $env:GITHUB_OUTPUT -Value ("host_elapsed_seconds=$elapsedSeconds") -Encoding utf8
            Add-Content -Path $env:GITHUB_OUTPUT -Value ("loop_execution_topology_present=" + [bool]$executionTopology) -Encoding utf8
          }
          if ($env:GITHUB_STEP_SUMMARY -and $executionTopology) {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### Loop Execution Topology" -Encoding utf8
            if ($executionTopology.runtimeSurface) { Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ("- Runtime surface: `{0}`" -f $executionTopology.runtimeSurface) -Encoding utf8 }
            if ($executionTopology.processModelClass) { Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ("- Process model: `{0}`" -f $executionTopology.processModelClass) -Encoding utf8 }
            if ($executionTopology.executionCellLeaseId) { Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ("- Execution cell lease: `{0}`" -f $executionTopology.executionCellLeaseId) -Encoding utf8 }
            if ($executionTopology.harnessInstanceLeaseId) { Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ("- Harness lease: `{0}`" -f $executionTopology.harnessInstanceLeaseId) -Encoding utf8 }
          }
          Get-Content runbook-ci.json

      - name: Upload Runbook Artifact
        uses: actions/upload-artifact@v7
        with:
          name: integration-runbook-result
          path: runbook-ci.json

      - name: Validate JSON Schema (basic)
        shell: pwsh
        run: |
          $json = Get-Content runbook-ci.json -Raw | ConvertFrom-Json
          if ($json.schema -ne 'integration-runbook-v1') { throw 'Schema mismatch' }
          if (-not $json.phases) { throw 'No phases in runbook output' }
          $loopPhase = @($json.phases) | Where-Object { $_.name -eq 'Loop' } | Select-Object -First 1
          if ($loopPhase -and $loopPhase.details -and $loopPhase.details.PSObject.Properties.Name -contains 'executionTopology') {
            $executionTopology = $loopPhase.details.executionTopology
            if (-not $executionTopology.runtimeSurface) { throw 'Loop executionTopology.runtimeSurface missing' }
            if (-not $executionTopology.processModelClass) { throw 'Loop executionTopology.processModelClass missing' }
          }
